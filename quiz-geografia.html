<head>

<title>Estude Mimi - Taxonomia de Bloom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#26221B;padding:20px 16px 60px;display:flex;justify-content:center;transition:background .6s}
body.normal{background:#F4F7FB}
body.hard{background:#2D0A0A}
.col{width:100%;max-width:600px}
h1{font-family:Georgia,serif;font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:11px;text-transform:uppercase;letter-spacing:.2em;font-weight:700;margin-bottom:16px}
body.normal .sub{color:#2B5EA7}
body.hard .sub{color:#FF6B6B}
body.normal h1{color:#26221B}
body.hard h1{color:#FFE4E4}
.modo-badge{display:none;background:#CC0000;color:#fff;font-size:13px;font-weight:900;letter-spacing:.25em;text-transform:uppercase;padding:8px 20px;border-radius:99px;margin-bottom:14px;text-align:center;animation:pulse 1.5s infinite}
body.hard .modo-badge{display:block}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(255,0,0,.5)}50%{box-shadow:0 0 40px rgba(255,0,0,.9)}}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.bar{flex:1;height:7px;border-radius:99px;overflow:hidden}
body.normal .bar{background:#D6DFE9}
body.hard .bar{background:#5C1A1A}
.fill{height:100%;border-radius:99px;transition:width .3s}
body.normal .fill{background:#2B5EA7}
body.hard .fill{background:#FF4444}
.lbl{font-size:12px;white-space:nowrap}
body.normal .lbl{color:#6B7A8D}
body.hard .lbl{color:#FF9999}
.score{border-radius:99px;padding:6px 12px;font-size:13px;font-weight:700;display:inline-block}
body.normal .score{background:#fff;border:1px solid #D6DFE9;color:#26221B}
body.hard .score{background:#5C1A1A;border:1px solid #8B0000;color:#FFE4E4}
.card{border-radius:16px;padding:20px;box-shadow:0 8px 24px -16px rgba(0,0,0,.4)}
body.normal .card{background:#fff;border:1px solid #D6DFE9}
body.hard .card{background:#3D0F0F;border:1px solid #8B0000}
.topic{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px}
body.normal .topic{color:#6B7A8D}
body.hard .topic{color:#FF9999}
.qnum{font-weight:800}
body.normal .qnum{color:#2B5EA7}
body.hard .qnum{color:#FF4444}
.question{font-family:Georgia,serif;font-size:17px;line-height:1.45;font-weight:600;margin-bottom:16px}
body.normal .question{color:#26221B}
body.hard .question{color:#FFE4E4}
.opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;border-radius:12px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;line-height:1.35;transition:border-color .1s,background .1s}
body.normal .opt{background:#fff;border:1.5px solid #D6DFE9;color:#26221B}
body.hard .opt{background:#4A1010;border:1.5px solid #8B0000;color:#FFE4E4}
body.normal .opt:hover:not(:disabled){border-color:#2B5EA7}
body.hard .opt:hover:not(:disabled){border-color:#FF4444}
.opt:disabled{cursor:default}
.letra{flex:none;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:700}
body.normal .letra{background:#F4F7FB;border:1px solid #D6DFE9;color:#26221B}
body.hard .letra{background:#5C1A1A;border:1px solid #8B0000;color:#FF9999}
.opt.certo{border-color:#2E8B6B!important;background:#E7F4EE!important}
.opt.certo .letra{background:#2E8B6B!important;color:#fff!important;border-color:#2E8B6B!important}
.opt.errado{border-color:#CC4636!important;background:#FBEAE7!important}
.opt.errado .letra{background:#CC4636!important;color:#fff!important;border-color:#CC4636!important}
.opt.dim{opacity:.4}
.feedback{margin-top:8px;border-radius:12px;padding:14px;text-align:center}
.feedback.ok{background:#E7F4EE;border:1px solid #BFE3D2}
.feedback.no{background:#FBEAE7;border:1px solid #F0CCC5}
.feedback img{width:100%;max-width:220px;border-radius:12px;margin:0 auto 10px;display:block}
.fhead{font-weight:800;font-size:17px;margin-bottom:6px}
.ok .fhead{color:#2E8B6B}
.no .fhead{color:#CC4636}
.fwhy{font-size:13px;color:#555;margin-top:6px;text-align:left;line-height:1.4}
.fcorreto{font-size:13px;font-weight:700;margin-top:4px;text-align:left;color:#333}
.btn{margin-top:14px;width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
body.normal .btn{background:#2B5EA7}
body.hard .btn{background:#CC0000}
.btn:active{opacity:.85}
.resultado{text-align:center;padding:20px 0}
.big{font-family:Georgia,serif;font-size:56px;font-weight:700;line-height:1}
body.normal .big{color:#2B5EA7}
body.hard .big{color:#FF4444}
.big small{font-size:20px;color:#6B7A8D}
.rmsg{font-size:15px;margin:10px 0 24px;line-height:1.4}
body.normal .rmsg{color:#26221B}
body.hard .rmsg{color:#FFE4E4}
.trow{display:flex;align-items:center;gap:8px;padding:10px 0}
body.normal .trow{border-top:1px solid #D6DFE9}
body.hard .trow{border-top:1px solid #5C1A1A}
.trow:last-child{border-bottom:1px solid #D6DFE9}
body.hard .trow:last-child{border-bottom:1px solid #5C1A1A}
.tnome{flex:1;font-size:13px;font-weight:600}
body.normal .tnome{color:#26221B}
body.hard .tnome{color:#FFE4E4}
.tbar{width:80px;height:5px;border-radius:99px;overflow:hidden}
body.normal .tbar{background:#D6DFE9}
body.hard .tbar{background:#5C1A1A}
.tfill{height:100%}
.tsc{font-size:12px;font-weight:700}
body.normal .tsc{color:#6B7A8D}
body.hard .tsc{color:#FF9999}
.foot{text-align:center;font-size:12px;margin-top:16px}
body.normal .foot{color:#6B7A8D}
body.hard .foot{color:#FF9999}
.banner{border-radius:16px;padding:30px 20px;text-align:center}
body.hard .banner{background:#3D0F0F;border:2px solid #FF0000;box-shadow:0 0 30px rgba(255,0,0,.3)}
.banner-emoji{font-size:48px;margin-bottom:12px}
.banner-titulo{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-bottom:10px;color:#FF4444}
.banner-desc{font-size:14px;line-height:1.6;color:#FF9999}
</style>
</head>

<script>
var EASY=[
{t:"Definição",q:"A Taxonomia de Bloom é uma ferramenta para:",o:["Avaliar o comportamento disciplinar dos alunos","Classificar conteúdos por ordem alfabética","Organizar o trabalho pedagógico classificando objetivos educacionais de forma hierárquica","Medir a inteligência inata dos estudantes"],c:2,w:"A Taxonomia de Bloom oferece uma estrutura lógica e hierárquica para classificar os objetivos educacionais."},
{t:"Definição",q:"A estrutura da Taxonomia de Bloom é considerada hierárquica porque:",o:["Todos os níveis têm a mesma complexidade","Os níveis são independentes entre si","Cada nível cognitivo se apoia no anterior, do mais simples ao mais complexo","A ordem dos níveis é aleatória e flexível"],c:2,w:"A hierarquia significa que cada nível depende do anterior — não se analisa sem compreender, por exemplo."},
{t:"Definição",q:"O principal objetivo da Taxonomia de Bloom é garantir que o ensino:",o:["Se resuma à transmissão de informações factuais","Promova o desenvolvimento progressivo das capacidades cognitivas do aluno","Foque exclusivamente na memorização de conteúdos","Elimine a necessidade de avaliações"],c:1,w:"A taxonomia existe para que o ensino promova o avanço progressivo do raciocínio, não apenas a transmissão de dados."},
{t:"Níveis",q:"Na versão revisada da Taxonomia de Bloom, a sequência correta dos 6 níveis cognitivos é:",o:["Criar → Avaliar → Analisar → Aplicar → Compreender → Lembrar","Lembrar → Aplicar → Compreender → Criar → Analisar → Avaliar","Compreender → Lembrar → Aplicar → Avaliar → Analisar → Criar","Lembrar → Compreender → Aplicar → Analisar → Avaliar → Criar"],c:3,w:"A sequência vai do mais simples ao mais complexo: Lembrar → Compreender → Aplicar → Analisar → Avaliar → Criar."},
{t:"Lembrar",q:"O nível 'Lembrar' da Taxonomia de Bloom envolve:",o:["Emitir julgamentos fundamentados sobre um tema","Recuperar informações armazenadas na memória","Criar soluções originais para problemas","Transferir conceitos para contextos novos"],c:1,w:"Lembrar é o nível mais básico: recuperar, reconhecer e recordar informações da memória."},
{t:"Lembrar",q:"Qual atividade corresponde ao nível 'Lembrar'?",o:["Elaborar um projeto artístico original","Julgar a qualidade de uma obra de arte","Listar os países participantes de um evento histórico","Comparar duas teorias pedagógicas"],c:2,w:"Listar e citar são verbos do nível Lembrar — apenas recuperam informações armazenadas."},
{t:"Lembrar",q:"São verbos associados ao nível 'Lembrar':",o:["Julgar, defender e justificar","Elaborar, projetar e inventar","Apontar, listar, relembrar e nomear","Comparar, classificar e diferenciar"],c:2,w:"Apontar, listar, relembrar, nomear, registrar, sublinhar são verbos do nível Lembrar."},
{t:"Compreender",q:"O nível 'Compreender' da Taxonomia de Bloom exige que o aluno:",o:["Apenas repita informações memorizadas","Construa significado a partir do conteúdo, explicando ou interpretando","Produza algo completamente original","Emita julgamentos sobre a validade de uma teoria"],c:1,w:"Compreender vai além de lembrar — o aluno precisa explicar, interpretar e dar significado ao conteúdo."},
{t:"Compreender",q:"São verbos associados ao nível 'Compreender':",o:["Listar, nomear e repetir","Descrever, explicar, identificar e interpretar","Elaborar, inventar e projetar","Usar, calcular e executar"],c:1,w:"Descrever, explicar, identificar, interpretar, traduzir e expressar são verbos de Compreender."},
{t:"Aplicar",q:"O nível 'Aplicar' se caracteriza por:",o:["Memorizar fórmulas e definições","Transferir o conhecimento para uma situação ou problema novo","Separar o todo em partes para análise","Emitir julgamentos sobre dados apresentados"],c:1,w:"Aplicar = transferir e usar o conhecimento em um contexto diferente do original."},
{t:"Aplicar",q:"Uma atividade que pede ao aluno para usar o conceito de causa e consequência em um contexto diferente corresponde ao nível:",o:["Lembrar","Compreender","Aplicar","Criar"],c:2,w:"O aluno não apenas lembra do conceito — ele o transfere e usa em nova situação. Isso é Aplicar."},
{t:"Aplicar",q:"São verbos típicos do nível 'Aplicar':",o:["Apontar, listar e relembrar","Julgar, defender e validar","Usar, calcular, executar e demonstrar","Elaborar, projetar e compor"],c:2,w:"Usar, calcular, executar, demonstrar, empregar, praticar são verbos do nível Aplicar."},
{t:"Analisar",q:"O nível 'Analisar' envolve:",o:["Apenas recuperar informações da memória","Elaborar produtos originais e criativos","Separar o todo em partes e identificar relações entre elas","Memorizar dados estatísticos"],c:2,w:"Analisar = decompor em partes, comparar, relacionar, diferenciar — ver a estrutura interna."},
{t:"Analisar",q:"São verbos associados ao nível 'Analisar':",o:["Listar, nomear e sublinhar","Comparar, classificar, diferenciar e distinguir","Repetir, marcar e registrar","Elaborar, inventar e desenhar"],c:1,w:"Comparar, classificar, diferenciar, distinguir, examinar, investigar são verbos de Analisar."},
{t:"Analisar",q:"Quando um aluno compara duas obras de arte identificando semelhanças e diferenças, ele está no nível:",o:["Lembrar","Aplicar","Analisar","Criar"],c:2,w:"Comparar e diferenciar são operações do nível Analisar — decomposição e relação entre partes."},
{t:"Avaliar",q:"O nível 'Avaliar' na Taxonomia de Bloom corresponde a:",o:["Repetir informações de memória","Aplicar fórmulas em exercícios","Emitir julgamento fundamentado com base em critérios","Criar produtos artísticos originais"],c:2,w:"Avaliar = julgar, defender, justificar — emissão de julgamento fundamentado, não apenas opinião."},
{t:"Avaliar",q:"São verbos típicos do nível 'Avaliar':",o:["Listar, apontar e nomear","Descrever, explicar e interpretar","Julgar, defender, justificar e validar","Usar, calcular e executar"],c:2,w:"Julgar, defender, justificar, validar, selecionar, estimar são verbos do nível Avaliar."},
{t:"Criar",q:"O nível 'Criar' é o mais complexo da taxonomia porque exige que o aluno:",o:["Apenas recupere dados memorizados","Elabore, projete ou invente algo original a partir dos conhecimentos dominados","Repita procedimentos já conhecidos","Descreva conceitos com suas próprias palavras"],c:1,w:"Criar é o topo da hierarquia: elaborar, projetar, inventar — produção original e síntese criativa."},
{t:"Criar",q:"São verbos associados ao nível 'Criar':",o:["Apontar, listar e relembrar","Comparar, diferenciar e classificar","Julgar, defender e justificar","Elaborar, projetar, inventar e compor"],c:3,w:"Elaborar, projetar, inventar, compor, formular e planejar são verbos do nível mais alto: Criar."},
{t:"Criar",q:"Pedir que um aluno elabore um projeto artístico original a partir dos conceitos estudados corresponde ao nível:",o:["Lembrar","Compreender","Avaliar","Criar"],c:3,w:"Elaborar algo original é a essência do nível Criar — o topo da taxonomia."},
{t:"Hierarquia",q:"A frase 'não se analisa o que não se compreende' expressa qual princípio da taxonomia?",o:["Que os níveis são independentes entre si","Que a memorização é o objetivo final do ensino","Que cada nível se apoia no anterior (hierarquia cumulativa)","Que todos os alunos aprendem no mesmo ritmo"],c:2,w:"A hierarquia cumulativa significa que dominar um nível é pré-requisito para o próximo."},
{t:"Hierarquia",q:"Segundo o resumo, 'não se cria o que não se domina'. Isso significa que:",o:["Criar é mais fácil que lembrar","O nível Criar exige domínio dos níveis anteriores","Os níveis podem ser trabalhados em qualquer ordem","A memorização é suficiente para a criação"],c:1,w:"Criar exige que todos os níveis anteriores tenham sido dominados — é o topo da pirâmide."},
{t:"Hierarquia",q:"Na estrutura hierárquica de Bloom, qual é o nível imediatamente anterior a 'Avaliar'?",o:["Aplicar","Compreender","Analisar","Criar"],c:2,w:"A sequência é: Lembrar → Compreender → Aplicar → Analisar → Avaliar → Criar. Analisar vem antes de Avaliar."},
{t:"Hierarquia",q:"Qual é o nível mais básico (mais simples) da Taxonomia de Bloom?",o:["Aplicar","Lembrar","Compreender","Analisar"],c:1,w:"Lembrar é a base da pirâmide — o nível cognitivo mais simples."},
{t:"Hierarquia",q:"Qual é o nível mais complexo da Taxonomia de Bloom revisada?",o:["Avaliar","Analisar","Lembrar","Criar"],c:3,w:"Criar é o topo da hierarquia — exige síntese criativa e domínio de todos os níveis anteriores."},
{t:"Etapas",q:"A Taxonomia de Bloom auxilia o educador em quantas etapas do trabalho pedagógico?",o:["2 etapas","5 etapas","3 etapas","6 etapas"],c:2,w:"São 3 etapas: Planejamento, Definição de conteúdo e Criação de avaliações."},
{t:"Etapas",q:"Na etapa de 'Planejamento', a Taxonomia de Bloom permite ao professor:",o:["Eliminar a necessidade de avaliações","Definir objetivos claros e graduais para o ensino","Aplicar provas padronizadas sem adaptação","Substituir os conteúdos por atividades lúdicas"],c:1,w:"O planejamento com Bloom permite definir objetivos claros, graduais e progressivos."},
{t:"Etapas",q:"A etapa de 'Definição de conteúdo' com base em Bloom ajuda o professor a:",o:["Selecionar quais conteúdos serão reconhecidos, compreendidos ou usados para raciocínio complexo","Eliminar conteúdos difíceis do currículo","Repetir os mesmos conteúdos em todos os bimestres","Definir conteúdos sem relação com os objetivos"],c:0,w:"Bloom ajuda a decidir o nível cognitivo que cada conteúdo deve atingir — do reconhecimento ao raciocínio complexo."},
{t:"Etapas",q:"A etapa 'Criação de avaliações' com Bloom garante que:",o:["As provas testem apenas memorização","Os exercícios não tenham relação com as aulas","As avaliações correspondam ao que foi ensinado e ao nível cognitivo trabalhado","As avaliações sejam sempre objetivas"],c:2,w:"Bloom alinha avaliações ao que foi ensinado — a prova deve corresponder ao nível cognitivo trabalhado."},
{t:"Aplicação",q:"A Taxonomia de Bloom torna o trabalho pedagógico:",o:["Aleatório e improvisado","Intencional, organizado e eficaz","Baseado apenas na intuição do professor","Centrado exclusivamente no livro didático"],c:1,w:"Bloom torna o trabalho pedagógico intencional (tem propósito), organizado (tem estrutura) e eficaz (gera resultados)."},
{t:"Hierarquia",q:"A importância da estrutura hierárquica de Bloom está em:",o:["Permitir que o professor pule etapas para acelerar o ensino","Garantir que o aluno domine as bases antes dos conteúdos mais complexos","Tornar o ensino mais rápido e superficial","Focar exclusivamente na avaliação final"],c:1,w:"A hierarquia garante domínio das bases antes de avançar — sem lacunas no aprendizado."},
{t:"Aplicação",q:"A estrutura de Bloom é fundamental para desenvolver nos alunos:",o:["Apenas a capacidade de memorização","O pensamento crítico e a aprendizagem significativa","A passividade e a repetição","A submissão às respostas prontas"],c:1,w:"Bloom promove pensamento crítico, aprendizagem significativa e evita lacunas no raciocínio."},
{t:"Aplicação",q:"Evitar lacunas no aprendizado, segundo o resumo, exige:",o:["Avançar rapidamente para os níveis mais complexos","Pular a etapa de compreensão quando o aluno memoriza bem","Garantir o domínio das bases antes de avançar para conteúdos mais complexos","Focar apenas no nível Criar desde o início"],c:2,w:"Sem dominar as bases, o aluno tem lacunas que impedem o avanço — a hierarquia previne isso."},
{t:"Níveis",q:"Se um aluno consegue descrever um conceito com suas palavras mas não aplicá-lo em situação nova, ele domina até o nível:",o:["Lembrar","Compreender","Aplicar","Analisar"],c:1,w:"Descrever com suas palavras é Compreender. Se não consegue aplicar, ainda não chegou ao nível Aplicar."},
{t:"Níveis",q:"Qual nível de Bloom é necessário para que um aluno compare duas teorias pedagógicas e identifique suas diferenças?",o:["Lembrar","Compreender","Aplicar","Analisar"],c:3,w:"Comparar e diferenciar exigem decomposição e relação entre partes — isso é Analisar."},
{t:"Níveis",q:"Um aluno que julga a qualidade de uma produção artística usando critérios fundamentados está operando no nível:",o:["Aplicar","Compreender","Avaliar","Lembrar"],c:2,w:"Julgar com fundamentação é o cerne do nível Avaliar."},
{t:"Níveis",q:"Inventar uma solução nova para um problema corresponde a qual nível?",o:["Compreender","Analisar","Avaliar","Criar"],c:3,w:"Inventar e projetar algo novo é o nível mais alto: Criar."},
{t:"Níveis",q:"Qual é a diferença entre 'Compreender' e 'Lembrar'?",o:["São níveis idênticos com nomes diferentes","Lembrar exige mais raciocínio que Compreender","Compreender exige dar significado; Lembrar é apenas recuperar dados","Compreender é mais simples que Lembrar"],c:2,w:"Lembrar = recuperar dados. Compreender = interpretar, explicar, dar significado ao que foi lembrado."},
{t:"Níveis",q:"Qual é a diferença essencial entre 'Aplicar' e 'Analisar'?",o:["São o mesmo nível cognitivo","Aplicar é mais complexo que Analisar","Aplicar transfere conhecimento para nova situação; Analisar decompõe e relaciona partes","Analisar é mais simples que Aplicar"],c:2,w:"Aplicar = usar em novo contexto. Analisar = decompor, comparar e relacionar componentes."},
{t:"Níveis",q:"Qual é a diferença entre 'Avaliar' e 'Criar'?",o:["Avaliar é mais complexo que Criar","Criar é mais simples que Avaliar","São termos intercambiáveis","Avaliar emite julgamento fundamentado; Criar produz algo original e novo"],c:3,w:"Avaliar = julgar com critérios. Criar = produzir algo novo. Criar é o nível mais alto."},
{t:"Classificação",q:"'Registrar as datas de eventos artísticos importantes' corresponde ao nível:",o:["Analisar","Avaliar","Lembrar","Criar"],c:2,w:"Registrar é apenas guardar informação — nível Lembrar, o mais básico."},
{t:"Classificação",q:"'Explicar com suas palavras o significado de uma obra de arte' corresponde ao nível:",o:["Compreender","Lembrar","Aplicar","Avaliar"],c:0,w:"Explicar com suas próprias palavras demonstra compreensão — vai além da simples memorização."},
{t:"Classificação",q:"'Usar uma técnica de pintura aprendida em aula para criar uma composição em outro contexto' corresponde ao nível:",o:["Lembrar","Compreender","Avaliar","Aplicar"],c:3,w:"Transferir uma técnica para novo contexto é Aplicar — usar o conhecimento em situação diferente."},
{t:"Classificação",q:"'Classificar obras de arte por período histórico identificando características comuns' é um exemplo de:",o:["Lembrar","Aplicar","Avaliar","Analisar"],c:3,w:"Classificar exige decompor, comparar e identificar padrões — operações do nível Analisar."},
{t:"Classificação",q:"'Defender sua opinião sobre uma exposição artística com argumentos fundamentados' corresponde ao nível:",o:["Criar","Avaliar","Lembrar","Aplicar"],c:1,w:"Defender com argumentos = julgamento fundamentado = nível Avaliar."},
{t:"Classificação",q:"'Projetar uma instalação artística original integrando conceitos estudados no semestre' corresponde ao nível:",o:["Lembrar","Compreender","Criar","Analisar"],c:2,w:"Projetar algo original integrando conhecimentos é o topo da taxonomia: Criar."},
{t:"Versão revisada",q:"A principal mudança da versão revisada da Taxonomia de Bloom em relação à original é:",o:["A eliminação dos níveis inferiores","A substituição de substantivos por verbos de ação nos nomes dos níveis","A redução para apenas 3 níveis","A inversão completa da hierarquia"],c:1,w:"A versão revisada (2001) trocou substantivos (Conhecimento, Compreensão...) por verbos (Lembrar, Compreender...)."},
{t:"Versão revisada",q:"Na versão revisada, o nível que antes se chamava 'Síntese' na taxonomia original passou a se chamar:",o:["Avaliar","Analisar","Compreender","Criar"],c:3,w:"Síntese (original) → Criar (revisada), colocado como nível mais alto, acima de Avaliar."}
];

var HARD=[
{t:"Análise de atividade",q:"Uma professora pede que os alunos listem os materiais utilizados em uma técnica artística. Em seguida, pede que expliquem por que cada material é importante. Esses dois momentos correspondem, respectivamente, aos níveis:",o:["Lembrar e Compreender","Compreender e Aplicar","Aplicar e Analisar","Analisar e Avaliar"],c:0,w:"Listar = Lembrar (recupera dados). Explicar a importância = Compreender (dá significado ao conteúdo)."},
{t:"Análise de atividade",q:"Um professor propõe: 'Use a técnica de perspectiva aprendida para desenhar uma cena do seu bairro'. Logo depois pede: 'Compare seu desenho com o de um colega, identificando diferenças na aplicação da técnica'. Os níveis mobilizados são:",o:["Lembrar e Compreender","Compreender e Avaliar","Aplicar e Analisar","Analisar e Criar"],c:2,w:"Usar em novo contexto = Aplicar. Comparar e identificar diferenças = Analisar."},
{t:"Análise de atividade",q:"Um aluno escreve uma crítica fundamentada sobre uma exposição de arte, e em seguida projeta sua própria obra baseada nos conceitos criticados. Ele operou nos níveis:",o:["Lembrar e Compreender","Aplicar e Analisar","Avaliar e Criar","Compreender e Aplicar"],c:2,w:"Crítica fundamentada = Avaliar. Projetar obra original = Criar."},
{t:"Planejamento",q:"Um professor que usa Bloom para planejar uma unidade sobre impressionismo deve começar por atividades que exijam:",o:["Criação imediata de obras no estilo impressionista","Avaliação crítica de obras antes de conhecê-las","Recuperação e reconhecimento das características do movimento","Análise comparativa entre impressionismo e cubismo"],c:2,w:"A hierarquia exige começar pela base: Lembrar (reconhecer, identificar) antes de avançar."},
{t:"Planejamento",q:"Se o objetivo final de uma sequência didática é que o aluno 'elabore uma composição artística original', o professor deve garantir que antes o aluno tenha dominado:",o:["Apenas o nível Lembrar, pois é suficiente para criar","Todos os cinco níveis anteriores: lembrar, compreender, aplicar, analisar e avaliar","Apenas os níveis Lembrar e Aplicar","Somente o nível Avaliar"],c:1,w:"Criar é o topo — exige domínio de todos os anteriores. Sem base, a criação é superficial."},
{t:"Avaliação",q:"Uma prova que pede apenas que o aluno 'cite 5 artistas do Renascimento' avalia exclusivamente o nível:",o:["Compreender","Aplicar","Lembrar","Analisar"],c:2,w:"Citar de memória é recuperação de informação — o nível mais básico: Lembrar."},
{t:"Avaliação",q:"Se o professor ensinou até o nível 'Analisar' mas a prova exige apenas memorização, segundo Bloom há um problema de:",o:["Excesso de dificuldade na avaliação","Desalinhamento entre o nível cognitivo ensinado e o avaliado","Falta de conteúdo no planejamento","Excesso de criatividade nas questões"],c:1,w:"A etapa 'Criação de avaliações' em Bloom garante que a prova corresponda ao que foi efetivamente ensinado."},
{t:"Avaliação",q:"Para avaliar o nível 'Avaliar' em uma prova de artes, a questão mais adequada seria:",o:["Cite três técnicas de pintura estudadas","Defina o que é arte abstrata","Defenda, com argumentos, qual das duas obras apresentadas é mais expressiva e por quê","Desenhe uma cópia da obra apresentada"],c:2,w:"Defender com argumentos fundamentados exige julgamento crítico — essência do nível Avaliar."},
{t:"Avaliação",q:"Uma avaliação que pede ao aluno para 'elaborar um manifesto artístico com proposta estética original' avalia o nível:",o:["Lembrar","Compreender","Analisar","Criar"],c:3,w:"Elaborar algo original (manifesto com proposta estética própria) é o nível mais alto: Criar."},
{t:"Hierarquia",q:"Um aluno consegue comparar obras de arte mas não consegue emitir julgamentos fundamentados sobre elas. Segundo Bloom, ele domina até o nível:",o:["Compreender","Aplicar","Analisar","Avaliar"],c:2,w:"Comparar é Analisar. Julgar com fundamentação é Avaliar. Ele domina até Analisar."},
{t:"Hierarquia",q:"Um aluno consegue explicar um conceito mas não consegue usá-lo em situação nova. Qual nível ele ainda não atingiu?",o:["Lembrar","Compreender","Aplicar","Analisar"],c:2,w:"Explicar = Compreender (domina). Usar em contexto novo = Aplicar (não atingiu)."},
{t:"Hierarquia",q:"A principal consequência de pular níveis na hierarquia de Bloom é:",o:["Maior velocidade no aprendizado","Lacunas no aprendizado que impedem o domínio dos níveis superiores","Desenvolvimento acelerado do pensamento crítico","Resultados melhores nas avaliações"],c:1,w:"Pular níveis gera lacunas — sem base sólida, os níveis superiores ficam comprometidos."},
{t:"Classificação avançada",q:"A atividade 'esquematizar as relações entre os movimentos artísticos do século XX' mobiliza o nível:",o:["Lembrar","Compreender","Aplicar","Analisar"],c:3,w:"Esquematizar relações exige decomposição e organização das partes — operação do nível Analisar."},
{t:"Classificação avançada",q:"'Narrar os acontecimentos que levaram ao surgimento do Barroco' corresponde ao nível:",o:["Lembrar","Compreender","Analisar","Avaliar"],c:1,w:"Narrar com suas palavras exige atribuir significado ao conteúdo — vai além de listar: é Compreender."},
{t:"Classificação avançada",q:"'Experimentar diferentes técnicas de gravura para resolver um problema visual proposto pelo professor' mobiliza o nível:",o:["Lembrar","Compreender","Aplicar","Criar"],c:2,w:"Experimentar e usar técnicas em contexto proposto = transferir conhecimento = Aplicar."},
{t:"Classificação avançada",q:"'Selecionar e justificar qual de três técnicas é mais adequada para um determinado efeito visual' mobiliza o nível:",o:["Lembrar","Aplicar","Analisar","Avaliar"],c:3,w:"Selecionar com justificativa exige julgamento com critérios — essência do nível Avaliar."},
{t:"Classificação avançada",q:"'Formular uma proposta curatorial para uma exposição de arte contemporânea' mobiliza o nível:",o:["Lembrar","Compreender","Analisar","Criar"],c:3,w:"Formular uma proposta original integrando múltiplos conhecimentos é o nível mais alto: Criar."},
{t:"Verbos",q:"Os verbos 'esquematizar' e 'associar' pertencem ao nível:",o:["Lembrar","Compreender","Aplicar","Analisar"],c:1,w:"Esquematizar e associar exigem organizar e relacionar significados — operações do nível Compreender."},
{t:"Verbos",q:"Os verbos 'contrastar' e 'investigar' pertencem ao nível:",o:["Compreender","Aplicar","Analisar","Avaliar"],c:2,w:"Contrastar e investigar exigem decomposição e busca de relações — nível Analisar."},
{t:"Verbos",q:"Os verbos 'taxar' e 'valorizar' pertencem ao nível:",o:["Compreender","Aplicar","Analisar","Avaliar"],c:3,w:"Taxar e valorizar implicam emitir juízo de valor — operações do nível Avaliar."},
{t:"Verbos",q:"Os verbos 'constituir' e 'coordenar' pertencem ao nível:",o:["Analisar","Avaliar","Criar","Aplicar"],c:2,w:"Constituir e coordenar implicam produção e organização criativa — verbos do nível Criar."},
{t:"Verbos",q:"Os verbos 'dramatizar' e 'manipular' pertencem ao nível:",o:["Lembrar","Compreender","Aplicar","Analisar"],c:2,w:"Dramatizar e manipular envolvem uso prático do conhecimento em ação — nível Aplicar."},
{t:"Aplicação pedagógica",q:"Um professor que elabora atividades apenas no nível 'Lembrar' durante todo o ano está:",o:["Seguindo corretamente a Taxonomia de Bloom","Desenvolvendo todas as capacidades cognitivas dos alunos","Limitando o desenvolvimento cognitivo ao nível mais básico","Promovendo o pensamento crítico adequadamente"],c:2,w:"Ficar só em Lembrar impede o avanço cognitivo — Bloom exige progressão até os níveis superiores."},
{t:"Aplicação pedagógica",q:"Para promover aprendizagem significativa segundo a perspectiva de Bloom, o professor deve:",o:["Focar apenas na transmissão de informações","Planejar atividades que percorram progressivamente todos os níveis cognitivos","Exigir criação desde a primeira aula, sem base prévia","Avaliar apenas por provas de múltipla escolha"],c:1,w:"Aprendizagem significativa exige percorrer a hierarquia — do reconhecimento à criação."},
{t:"Aplicação pedagógica",q:"Ao usar Bloom para planejar uma aula de artes sobre escultura, a sequência mais coerente seria:",o:["Criar → Lembrar → Avaliar → Aplicar","Analisar → Criar → Lembrar → Compreender","Lembrar → Compreender → Aplicar → Analisar → Avaliar → Criar","Avaliar → Analisar → Aplicar → Compreender → Lembrar → Criar"],c:2,w:"A sequência pedagógica segue a hierarquia: do mais simples (Lembrar) ao mais complexo (Criar)."},
{t:"Versão revisada",q:"Na versão original de Bloom (1956), o nível mais alto era 'Avaliação'. Na versão revisada (2001), o nível mais alto passou a ser:",o:["Analisar","Compreender","Avaliar","Criar"],c:3,w:"A revisão de 2001 colocou Criar acima de Avaliar — reconhecendo a produção original como o nível mais complexo."},
{t:"Versão revisada",q:"A mudança de substantivos para verbos na versão revisada reflete a concepção de que os objetivos educacionais devem ser expressos como:",o:["Estados mentais estáticos e observáveis","Características inatas e imutáveis do aluno","Processos cognitivos ativos e dinâmicos","Conteúdos a serem memorizados"],c:2,w:"Verbos indicam ação — os objetivos educacionais são processos ativos, não estados estáticos."},
{t:"Domínio cognitivo",q:"A Taxonomia de Bloom revisada organiza especificamente o:",o:["Domínio psicomotor da aprendizagem","Domínio afetivo e emocional","Domínio cognitivo em 6 níveis hierárquicos","Domínio social e interpessoal"],c:2,w:"A taxonomia revisada trata especificamente do domínio cognitivo — os processos mentais de aprendizagem."},
{t:"Pensamento crítico",q:"O pensamento crítico, na perspectiva de Bloom, situa-se predominantemente nos níveis:",o:["Lembrar e Compreender","Lembrar e Aplicar","Analisar, Avaliar e Criar","Apenas no nível Aplicar"],c:2,w:"Pensamento crítico exige analisar, julgar e criar — os três níveis superiores da taxonomia."},
{t:"Pensamento crítico",q:"A aprendizagem significativa, relacionada à Taxonomia de Bloom, diferencia-se da aprendizagem mecânica porque:",o:["Ambas focam na memorização de informações","A significativa promove conexão entre níveis, a mecânica fica restrita ao nível Lembrar","A mecânica é mais eficaz para o pensamento crítico","A significativa dispensa a memorização prévia"],c:1,w:"Aprendizagem significativa percorre os níveis, conectando saberes. Mecânica fica na repetição sem sentido."},
{t:"Cenário",q:"Uma escola adota Bloom para padronizar suas avaliações. O diretor determina que toda prova deve ter questões nos 6 níveis. Qual é o problema potencial dessa decisão?",o:["Nenhum problema, é a aplicação ideal","Os alunos podem ser avaliados em níveis que ainda não foram trabalhados em aula","As provas ficarão muito curtas","Os professores terão menos trabalho"],c:1,w:"Se o professor ensinou até Aplicar, cobrar Avaliar e Criar na prova gera desalinhamento — Bloom exige coerência."},
{t:"Cenário",q:"Um professor pede que alunos 'memorizem 20 datas da história da arte' e depois 'criem uma obra original inspirada em um movimento artístico'. Segundo Bloom, essa sequência tem um problema porque:",o:["Memorizar datas é inútil em artes","A sequência está perfeitamente alinhada","Pula os níveis intermediários (Compreender, Aplicar, Analisar, Avaliar) entre Lembrar e Criar","Criar deveria vir antes de Lembrar"],c:2,w:"Saltar de Lembrar direto para Criar ignora todos os níveis intermediários — gera lacunas."},
{t:"Cenário",q:"Dois professores ensinam o mesmo conteúdo sobre arte abstrata. O Professor A pede apenas que os alunos listem artistas. O Professor B pede que comparem estilos e justifiquem preferências. Segundo Bloom:",o:["Ambos trabalham o mesmo nível cognitivo","O Professor A trabalha Analisar e o B trabalha Lembrar","O Professor A trabalha Lembrar; o Professor B trabalha Analisar e Avaliar","O Professor B é menos eficaz que o A"],c:2,w:"A: listar = Lembrar. B: comparar = Analisar + justificar = Avaliar. B atinge níveis superiores."},
{t:"Cenário",q:"Uma prova de artes contém: Q1: Cite técnicas do Impressionismo. Q2: Explique a diferença entre Impressionismo e Expressionismo. Q3: Crie uma composição que combine elementos dos dois movimentos. Os níveis avaliados são, respectivamente:",o:["Lembrar, Lembrar, Lembrar","Compreender, Analisar, Criar","Lembrar, Analisar/Compreender, Criar","Aplicar, Avaliar, Criar"],c:2,w:"Q1: citar = Lembrar. Q2: diferenciar = Analisar (com elemento de Compreender). Q3: criar composição original = Criar."},
{t:"Ensino de artes",q:"No ensino de artes, a Taxonomia de Bloom é particularmente útil porque:",o:["Artes não exigem raciocínio complexo","Permite estruturar progressivamente o desenvolvimento da apreciação, análise e criação artística","Substitui a necessidade de prática artística","Foca apenas na memorização de estilos e artistas"],c:1,w:"Em artes, Bloom organiza a progressão: de conhecer estilos (Lembrar) até criar obras originais (Criar)."},
{t:"Ensino de artes",q:"'Apreciar uma obra de arte' envolve predominantemente os níveis:",o:["Apenas Lembrar","Apenas Aplicar","Compreender, Analisar e Avaliar","Apenas Criar"],c:2,w:"Apreciar = compreender o contexto, analisar elementos e julgar com critérios — níveis intermediários a superiores."},
{t:"Ensino de artes",q:"A criação artística, no topo da Taxonomia de Bloom, exige que o aluno previamente:",o:["Tenha talento inato e dom natural","Conheça (Lembrar), compreenda, aplique, analise e avalie os conceitos relevantes","Apenas memorize técnicas isoladas","Copie obras de artistas consagrados"],c:1,w:"Criar não é dom — é resultado do domínio progressivo de todos os níveis cognitivos anteriores."},
{t:"Ensino de artes",q:"No contexto do ensino de artes, a diferença entre 'reproduzir uma técnica' e 'inventar uma técnica nova' corresponde à diferença entre os níveis:",o:["Lembrar e Compreender","Compreender e Analisar","Aplicar e Criar","Avaliar e Analisar"],c:2,w:"Reproduzir técnica em contexto = Aplicar. Inventar técnica nova = Criar."},
{t:"Integração",q:"A Taxonomia de Bloom, ao ser aplicada ao ensino de artes, contribui para superar a visão de que artes é apenas:",o:["Uma disciplina que exige raciocínio complexo","Uma prática que desenvolve múltiplas competências","Uma atividade de lazer ou dom natural sem progressão pedagógica estruturada","Uma área do conhecimento com objetivos claros"],c:2,w:"Bloom estrutura artes como disciplina com progressão cognitiva — não apenas lazer, dom ou atividade livre."},
{t:"Integração",q:"Relacionar a Taxonomia de Bloom à BNCC no ensino de artes é coerente porque ambas:",o:["Focam apenas na memorização de conteúdos artísticos","Ignoram o desenvolvimento de habilidades","Propõem o desenvolvimento progressivo de competências e habilidades","Eliminam a necessidade de avaliação"],c:2,w:"Tanto Bloom quanto a BNCC defendem progressão de competências — do simples ao complexo."},
{t:"Crítica",q:"Uma limitação apontada por críticos à Taxonomia de Bloom é que:",o:["Não tem utilidade prática para professores","A hierarquia rígida pode não refletir a complexidade real dos processos cognitivos, que muitas vezes são simultâneos","É excessivamente flexível e sem estrutura","Foi desenvolvida recentemente e não tem base teórica"],c:1,w:"Críticos apontam que os processos cognitivos nem sempre seguem uma escada linear — podem ser simultâneos e recursivos."},
{t:"Crítica",q:"Apesar das críticas, a Taxonomia de Bloom continua sendo amplamente utilizada porque:",o:["Não existem alternativas disponíveis","Oferece uma estrutura prática e acessível para organizar objetivos, atividades e avaliações","Os críticos foram refutados completamente","É obrigatória por lei em todos os países"],c:1,w:"Bloom é prático: dá ao professor uma ferramenta clara para planejar, ensinar e avaliar com intencionalidade."},
{t:"Metacognição",q:"A versão revisada de Bloom (2001) acrescentou uma dimensão que a original não tinha: a dimensão do conhecimento. Ela inclui:",o:["Apenas conhecimento factual","Conhecimento factual, conceitual, procedimental e metacognitivo","Apenas conhecimento procedimental e metacognitivo","Conhecimento emocional e social"],c:1,w:"A revisão de 2001 cruzou os processos cognitivos com 4 tipos de conhecimento: factual, conceitual, procedimental e metacognitivo."},
{t:"Metacognição",q:"O 'conhecimento metacognitivo' na versão revisada de Bloom refere-se a:",o:["Memorização de dados sobre cognição","O conhecimento do aluno sobre seus próprios processos de pensamento e aprendizagem","Conhecimento factual sobre o cérebro","Habilidades motoras refinadas"],c:1,w:"Metacognição = pensar sobre o próprio pensamento — o aluno conhece e regula seus processos de aprendizagem."},
{t:"Cenário avançado",q:"Uma professora de artes planeja: Aula 1 - alunos identificam elementos visuais em obras. Aula 2 - explicam o significado desses elementos. Aula 3 - aplicam os elementos em composição própria. Aula 4 - comparam suas composições com as dos colegas. Aula 5 - defendem as escolhas feitas. Aula 6 - projetam uma exposição coletiva. A progressão corresponde exatamente a:",o:["Uma sequência aleatória sem critério pedagógico","Apenas os 3 primeiros níveis de Bloom repetidos","Os 6 níveis de Bloom em ordem: Lembrar → Compreender → Aplicar → Analisar → Avaliar → Criar","Uma inversão da hierarquia de Bloom"],c:2,w:"Cada aula corresponde a um nível: identificar=Lembrar, explicar=Compreender, aplicar=Aplicar, comparar=Analisar, defender=Avaliar, projetar=Criar."},
{t:"Cenário avançado",q:"Se um aluno consegue criar obras originais mas não consegue explicar ou defender suas escolhas artisticamente, segundo Bloom:",o:["O aluno domina plenamente todos os níveis","Há uma lacuna nos níveis Compreender e Avaliar, indicando aprendizagem incompleta","A criação dispensa a compreensão e a avaliação","O aluno é mais inteligente que seus colegas"],c:1,w:"Bloom é hierárquico: criar sem compreender ou avaliar sugere lacunas — a produção pode ser intuitiva mas sem fundamentação."},
{t:"Interdisciplinaridade",q:"A Taxonomia de Bloom é específica para o ensino de artes ou pode ser aplicada a qualquer disciplina?",o:["É exclusiva do ensino de artes e não se aplica a outras áreas","Foi criada para matemática e adaptada para artes","É uma ferramenta universal aplicável a qualquer área do conhecimento","Só funciona em disciplinas exatas"],c:2,w:"Bloom é universal — foi criada como ferramenta para classificar objetivos educacionais de qualquer disciplina."}
];

var idx=0,sel=null,answered=false,score=0,results=[],fase=1,banner=false;
function isHard(){return fase===2;}
function QQ(){return fase===1?EASY:HARD;}
function idxFase(){return idx-(fase===1?0:EASY.length);}
function L(i){return String.fromCharCode(65+i);}
function setModo(){document.getElementById("body").className=isHard()?"hard":"normal";}

function render(){
  setModo();
  var app=document.getElementById("app");
  var totalG=EASY.length+HARD.length;

  if(banner){
    app.innerHTML="<div class='banner'><div class='banner-emoji'>🔥💀🔥</div><div class='banner-titulo'>MODO DIFÍCIL ATIVADO</div><div class='banner-desc'>Fase 1 concluída com <strong style='color:#FF4444'>"+score+"</strong> acertos.<br><br>Agora são cenários, pegadinhas e classificações avançadas.<br>Leia com muita atenção.</div><button class='btn' style='margin-top:20px' onclick='iniciarF2()'>Aceitar o desafio</button></div>";
    return;
  }

  if(idx>=totalG){
    var pct=Math.round((score/totalG)*100);
    var msg=pct>=85?"Impressionante. Domínio completo da Taxonomia.":pct>=70?"Bom desempenho. Revise os tópicos mais fracos.":pct>=50?"No caminho. Revise antes da prova.":"Revise o resumo com calma e tente de novo.";
    var byT={};
    results.forEach(function(r){if(!byT[r.t])byT[r.t]={ok:0,n:0};byT[r.t].n++;if(r.ok)byT[r.t].ok++;});
    var rows="";
    Object.keys(byT).forEach(function(t){
      var p=Math.round((byT[t].ok/byT[t].n)*100);
      var c=p>=70?"#2E8B6B":p>=50?"#D9831A":"#CC4636";
      rows+="<div class='trow'><div class='tnome'>"+t+"</div><div class='tbar'><div class='tfill' style='width:"+p+"%;background:"+c+"'></div></div><div class='tsc'>"+byT[t].ok+"/"+byT[t].n+"</div></div>";
    });
    app.innerHTML="<div class='resultado'><div class='big'>"+score+"<small>/"+totalG+"</small></div><div style='font-size:13px;font-weight:700;margin-top:4px'>"+pct+"% de acerto</div><p class='rmsg'>"+msg+"</p></div><div class='card'><div class='sub'>Por tópico</div>"+rows+"<button class='btn' style='margin-top:16px' onclick='reiniciar()'>Recomeçar</button></div><div class='foot'>Estude com a Mimi! 🐕</div>";
    return;
  }

  var q=QQ()[idxFase()];
  var prog=Math.round(((idx+(answered?1:0))/totalG)*100);
  var opts="";
  q.o.forEach(function(o,i){
    var cls="opt";
    if(answered){if(i===q.c)cls+=" certo";else if(i===sel)cls+=" errado";else cls+=" dim";}
    opts+="<button class='"+cls+"' "+(answered?"disabled":"")+" onclick='escolher("+i+")'><span class='letra'>"+L(i)+"</span><span>"+o+"</span></button>";
  });
  var fb="";
  if(answered){
    var ok=sel===q.c;
    fb="<div class='feedback "+(ok?"ok":"no")+"'><img src='"+(ok?"dog-acertou.png":"dog-errou.png")+"' alt='feedback'><div class='fhead'>"+(ok?"🎉 Você Acertou!":"❌ Você Errou")+"</div><div class='fcorreto'>Correta: "+L(q.c)+"</div><div class='fwhy'>"+q.w+"</div></div><button class='btn' onclick='prox()'>"+(idx+1>=totalG?"Ver resultado":"Próxima →")+"</button>";
  }
  var badge=isHard()?"<div class='modo-badge'>💀 MODO DIFÍCIL 💀</div>":"";
  var fl=isHard()?"FASE 2 · MODO DIFÍCIL":"FASE 1 · TAXONOMIA DE BLOOM";
  app.innerHTML=badge+"<div class='sub'>"+fl+"</div><h1>Fundamentos do Ensino de Artes</h1><div style='display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px'><div class='progress-row' style='flex:1;margin:0'><div class='bar'><div class='fill' style='width:"+prog+"%'></div></div><span class='lbl'>"+(idx+1)+"/"+totalG+"</span></div><span class='score'>✓ "+score+"/"+totalG+"</span></div><div class='card'><div class='topic'><span class='qnum'>Q"+(idx+1)+"</span> · "+q.t+"</div><div class='question'>"+q.q+"</div>"+opts+fb+"</div><div class='foot'>"+(answered?"Leia a explicação.":"Leia todas as alternativas antes de responder.")+"</div>";
}

function escolher(i){if(answered)return;sel=i;answered=true;var ok=i===QQ()[idxFase()].c;if(ok)score++;results.push({t:QQ()[idxFase()].t,ok:ok});render();}
function prox(){idx++;sel=null;answered=false;if(idx===EASY.length){fase=2;banner=true;setModo();}render();}
function iniciarF2(){banner=false;render();}
function reiniciar(){idx=0;sel=null;answered=false;score=0;results=[];fase=1;banner=false;render();}
render();
</script>
