<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estude Mimi - Quiz de Geografia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FBF7EF;color:#26221B;padding:20px 16px 60px;display:flex;justify-content:center}
.col{width:100%;max-width:600px}
h1{font-family:Georgia,serif;font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#A9620A;font-weight:700;margin-bottom:16px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.bar{flex:1;height:7px;background:#EDE4D3;border-radius:99px;overflow:hidden}
.fill{height:100%;background:#D9831A;border-radius:99px;transition:width .3s}
.lbl{font-size:12px;color:#736B5E;white-space:nowrap}
.score{background:#fff;border:1px solid #EDE4D3;border-radius:99px;padding:6px 12px;font-size:13px;font-weight:700;margin-bottom:18px;display:inline-block}
.card{background:#fff;border:1px solid #EDE4D3;border-radius:16px;padding:20px;box-shadow:0 8px 24px -16px rgba(0,0,0,.3)}
.topic{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#736B5E;font-weight:700;margin-bottom:6px}
.qnum{color:#A9620A}
.question{font-family:Georgia,serif;font-size:18px;line-height:1.4;font-weight:600;margin-bottom:16px}
.opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:#fff;border:1.5px solid #EDE4D3;border-radius:12px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;line-height:1.35;color:#26221B;transition:border-color .1s,background .1s}
.opt:hover:not(:disabled){border-color:#D9831A}
.opt:disabled{cursor:default}
.letra{flex:none;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:700;background:#FBF7EF;border:1px solid #EDE4D3}
.opt.certo{border-color:#2E8B6B;background:#E7F4EE}
.opt.certo .letra{background:#2E8B6B;color:#fff;border-color:#2E8B6B}
.opt.errado{border-color:#CC4636;background:#FBEAE7}
.opt.errado .letra{background:#CC4636;color:#fff;border-color:#CC4636}
.opt.dim{opacity:.5}
.feedback{margin-top:8px;border-radius:12px;padding:14px;border:1px solid #EDE4D3;text-align:center}
.feedback.ok{background:#E7F4EE;border-color:#BFE3D2}
.feedback.no{background:#FBEAE7;border-color:#F0CCC5}
.feedback img{width:100%;max-width:260px;border-radius:12px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
.fhead{font-weight:800;font-size:17px;margin-bottom:6px}
.ok .fhead{color:#2E8B6B}
.no .fhead{color:#CC4636}
.fwhy{font-size:13px;color:#736B5E;margin-top:6px;text-align:left}
.fcorreto{font-size:13px;color:#26221B;font-weight:600;margin-top:4px;text-align:left}
.btn{margin-top:14px;width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;background:#D9831A;color:#fff}
.btn:active{opacity:.9}
.resultado{text-align:center;padding:20px 0}
.big{font-family:Georgia,serif;font-size:56px;font-weight:700;color:#A9620A;line-height:1}
.big small{font-size:20px;color:#736B5E}
.rmsg{font-size:15px;margin:10px 0 24px;line-height:1.4}
.trow{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid #EDE4D3}
.trow:last-child{border-bottom:1px solid #EDE4D3}
.tnome{flex:1;font-size:13px;font-weight:600}
.tbar{width:80px;height:5px;background:#EDE4D3;border-radius:99px;overflow:hidden}
.tfill{height:100%}
.tsc{font-size:12px;color:#736B5E;font-weight:700}
.foot{text-align:center;font-size:12px;color:#736B5E;margin-top:16px}
</style>
</head>
<body>
<div class="col" id="app"></div>
<script>
var Q=[{"t":"Anos iniciais e BNCC","q":"O ensino de geografia nos anos iniciais deve partir do:","o":["Espaço global e abstrato","Espaço vivido, relações sociais e cotidiano da criança","Estudo de países distantes","Memorização de capitais e bandeiras"],"c":1,"w":"Parte-se do espaço vivido e do cotidiano da criança — o próximo e concreto."},{"t":"Anos iniciais e BNCC","q":"A BNCC propõe que o ensino de geografia relacione:","o":["A experiência cotidiana do estudante à leitura do mundo e do espaço","Apenas conteúdos teóricos e abstratos","Somente a cartografia avançada","A geografia física exclusivamente à matemática"],"c":0,"w":"A BNCC liga a experiência cotidiana do estudante à leitura do mundo e do espaço."},{"t":"Anos iniciais e BNCC","q":"Pedir aos alunos que desenhem o caminho de casa até a escola é exemplo de:","o":["Alfabetização cartográfica por meio do croqui","Avaliação somativa","Aula puramente expositiva","Memorização de mapas-múndi"],"c":0,"w":"O desenho do trajeto é alfabetização cartográfica feita por meio do croqui."},{"t":"Anos iniciais e BNCC","q":"Comparar fotos antigas do bairro com imagens atuais trabalha a compreensão de:","o":["Geografia astronômica","Transformações do espaço geográfico ao longo do tempo","Cálculo de áreas","Regras ortográficas"],"c":1,"w":"A comparação evidencia as transformações do espaço geográfico."},{"t":"Anos iniciais e BNCC","q":"Partir do 'espaço vivido' corresponde a ir do:","o":["Abstrato para o concreto","Concreto e próximo para o abstrato e distante","Global para o nada","Mapa-múndi para o croqui"],"c":1,"w":"O percurso pedagógico vai do concreto/próximo ao abstrato/distante."},{"t":"Anos iniciais e BNCC","q":"O croqui na alfabetização cartográfica é:","o":["Um mapa oficial em escala precisa","Um esboço que representa o espaço de forma simplificada","Uma fotografia aérea profissional","Uma maquete tridimensional"],"c":1,"w":"Croqui é um esboço simplificado — primeiro passo da representação cartográfica."},{"t":"Anos iniciais e BNCC","q":"A BNCC destaca que a geografia escolar deve desenvolver o:","o":["Raciocínio geográfico","Cálculo diferencial","Raciocínio exclusivamente histórico","Domínio de idiomas"],"c":0,"w":"A BNCC destaca o raciocínio geográfico (pensar o espaço, localizar, relacionar fenômenos)."},{"t":"Anos iniciais e BNCC","q":"Trabalhar fotografias do bairro ajuda o aluno a perceber que o espaço é:","o":["Imutável e fixo","Dinâmico e transformado pela sociedade","Apenas natural","Desligado do cotidiano"],"c":1,"w":"O espaço é dinâmico e socialmente produzido/transformado."},{"t":"Anos iniciais e BNCC","q":"'Leitura do mundo e do espaço' pressupõe que o aluno:","o":["Apenas decore informações","Compreenda e interprete a realidade ao seu redor","Ignore seu cotidiano","Estude somente o mapa-múndi"],"c":1,"w":"Ler o mundo é compreender e interpretar criticamente a realidade espacial vivida."},{"t":"Anos iniciais e BNCC","q":"A geografia nos anos iniciais valoriza o cotidiano da criança porque:","o":["Afasta o conteúdo da vida do aluno","Dá sentido ao aprendizado partindo do que o aluno conhece","Substitui qualquer conteúdo conceitual","Impede a aprendizagem de mapas"],"c":1,"w":"Partir do conhecido dá significado e serve de base para conceitos mais complexos."},{"t":"Conceitos geográficos","q":"'Tudo que pode ser percebido pelos sentidos em determinado espaço' define:","o":["Lugar","Paisagem","Território","Região"],"c":1,"w":"Paisagem é o que se percebe pelos sentidos em um espaço."},{"t":"Conceitos geográficos","q":"O exemplo do resumo para PAISAGEM é:","o":["Casa","Cachoeira","Brasil","Bairro"],"c":1,"w":"O resumo usa 'cachoeira' como exemplo de paisagem."},{"t":"Conceitos geográficos","q":"'Espaço vivido, carregado de experiências, pertencimento e afetividade' define:","o":["Território","Lugar","Paisagem","Região"],"c":1,"w":"Lugar é o espaço vivido, marcado por afeto, identidade e pertencimento."},{"t":"Conceitos geográficos","q":"O exemplo do resumo para LUGAR é:","o":["Casa","Cachoeira","Brasil","Continente"],"c":0,"w":"O resumo usa 'casa' como exemplo de lugar."},{"t":"Conceitos geográficos","q":"'Espaço delimitado e controlado por um grupo, com relações de poder' é:","o":["Paisagem","Lugar","Território","Sítio"],"c":2,"w":"Território é o espaço delimitado e controlado, definido por relações de poder."},{"t":"Conceitos geográficos","q":"O exemplo do resumo para TERRITÓRIO é:","o":["Casa","Cachoeira","Brasil","Praça"],"c":2,"w":"O resumo usa 'Brasil' como exemplo de território."},{"t":"Conceitos geográficos","q":"O que mais distingue o território das outras categorias é:","o":["A afetividade","As relações de poder e controle","A percepção pelos sentidos","A escala do mapa"],"c":1,"w":"O território se define essencialmente por poder, controle e delimitação."},{"t":"Conceitos geográficos","q":"A categoria mais ligada à afetividade e pertencimento é:","o":["Território","Lugar","Paisagem","Região"],"c":1,"w":"Lugar é a categoria do vínculo afetivo e da identidade (topofilia)."},{"t":"Conceitos geográficos","q":"Diferença essencial entre lugar e território:","o":["Lugar envolve poder; território envolve afeto","Lugar envolve afeto/vivência; território envolve poder/controle","São sinônimos","Ambos ignoram a ação humana"],"c":1,"w":"Lugar = vivência e afeto; território = poder e controle sobre o espaço."},{"t":"Conceitos geográficos","q":"A paisagem costuma ser classificada em:","o":["Natural e cultural (humanizada)","Política e econômica","Vertical e horizontal","Antiga e moderna"],"c":0,"w":"Paisagem natural (pouca ação humana) e cultural/humanizada (transformada pela sociedade)."},{"t":"Conceitos geográficos","q":"Cidade com ruas, prédios e indústrias é exemplo de paisagem:","o":["Natural","Cultural / humanizada","Intocada","Imaginária"],"c":1,"w":"A presença da ação humana caracteriza a paisagem cultural/humanizada."},{"t":"Conceitos geográficos","q":"Para Milton Santos, o espaço geográfico é:","o":["Conjunto indissociável de sistemas de objetos e sistemas de ações","Apenas o relevo de um país","Somente o território político","Uma paisagem natural sem ação humana"],"c":0,"w":"Milton Santos define o espaço como conjunto indissociável de sistemas de objetos e de ações."},{"t":"Conceitos geográficos","q":"A categoria 'região' refere-se a:","o":["Área com características que a diferenciam e lhe dão certa unidade","Espaço da afetividade individual","Tudo que os sentidos percebem","Apenas o controle por um governo"],"c":0,"w":"Região é uma porção do espaço com traços comuns que a singularizam."},{"t":"Conceitos geográficos","q":"A noção de território está mais associada a:","o":["Poder","Beleza cênica","Clima","Memória afetiva"],"c":0,"w":"Território e poder são indissociáveis (controle e domínio do espaço)."},{"t":"Conceitos geográficos","q":"Afirmar que a paisagem é dinâmica significa que ela:","o":["Nunca muda","Sofre transformações naturais e pela ação humana","Existe só na imaginação","Depende apenas do clima"],"c":1,"w":"A paisagem se transforma por processos naturais e pela ação da sociedade."},{"t":"Conceitos geográficos","q":"Estudar o 'lugar' na geografia escolar é importante porque:","o":["Afasta o aluno da sua realidade","Conecta o conteúdo à vivência e à identidade do aluno","Trata só de países estrangeiros","Elimina toda subjetividade"],"c":1,"w":"O lugar liga o conteúdo à experiência e ao pertencimento do estudante."},{"t":"Cartografia e recursos","q":"Os mapas ajudam na:","o":["Compreensão do espaço geográfico, localização e interpretação de informações","Memorização de datas históricas","Resolução de equações","Leitura de poemas"],"c":0,"w":"Mapas auxiliam na compreensão do espaço, localização e interpretação de informações."},{"t":"Cartografia e recursos","q":"As imagens facilitam a análise de:","o":["Paisagens e aspectos sociais, culturais e ambientais","Cálculos matemáticos","Regras gramaticais","Fórmulas químicas"],"c":0,"w":"As imagens facilitam a análise de paisagens e aspectos sociais, culturais e ambientais."},{"t":"Cartografia e recursos","q":"A alfabetização cartográfica tem como objetivo:","o":["Ensinar o aluno a ler, interpretar e produzir representações do espaço","Decorar nomes de rios","Apenas colorir mapas prontos","Memorizar capitais"],"c":0,"w":"Alfabetização cartográfica = formar leitores e produtores de mapas."},{"t":"Cartografia e recursos","q":"A escala cartográfica indica:","o":["A relação entre as medidas do mapa e a realidade","A cor dos oceanos","O número de habitantes","A direção dos ventos"],"c":0,"w":"Escala é a proporção entre a distância no mapa e a distância real."},{"t":"Cartografia e recursos","q":"Um mapa 1:100.000 comparado a um 1:10.000:","o":["Mostra área maior com menos detalhes","Mostra área menor com mais detalhes","É idêntico","Não tem relação com detalhamento"],"c":0,"w":"Maior denominador = menor escala: abrange área maior com menos detalhe."},{"t":"Cartografia e recursos","q":"Os elementos básicos de um mapa incluem:","o":["Título, legenda, escala e orientação","Apenas cores","Somente o título","Fotografias apenas"],"c":0,"w":"Um mapa completo traz título, legenda, escala e orientação."},{"t":"Cartografia e recursos","q":"A legenda de um mapa serve para:","o":["Explicar o significado dos símbolos e cores","Indicar o autor","Mostrar apenas a data","Substituir a escala"],"c":0,"w":"A legenda decodifica símbolos e cores usados na representação."},{"t":"Cartografia e recursos","q":"A rosa dos ventos indica:","o":["A orientação / os pontos cardeais","A escala","A população","O clima"],"c":0,"w":"A rosa dos ventos mostra a orientação (N, S, L, O)."},{"t":"Cartografia e recursos","q":"A 'visão vertical' é a base para construir:","o":["Mapas e plantas","Fotografias de perfil","Apenas maquetes","Croquis afetivos"],"c":0,"w":"Mapas e plantas usam a projeção vertical (visão de cima)."},{"t":"Cartografia e recursos","q":"A maquete como recurso didático ajuda o aluno a:","o":["Compreender a tridimensionalidade e representação do espaço","Decorar capitais","Calcular juros","Interpretar literatura"],"c":0,"w":"A maquete trabalha a noção de volume/relevo e a passagem do 3D para o 2D."},{"t":"Cartografia e recursos","q":"O trabalho de campo no ensino de geografia permite:","o":["Observar e analisar o espaço real, ligando teoria e prática","Apenas passear sem objetivo","Substituir o conteúdo teórico","Evitar o contato com a realidade"],"c":0,"w":"O trabalho de campo conecta a teoria à observação direta do espaço."},{"t":"Cartografia e recursos","q":"Google Earth e SIG contribuem para:","o":["A visualização e análise do espaço geográfico","A aula de educação física","A memorização gramatical","Algo sem relação com geografia"],"c":0,"w":"Tecnologias geoespaciais ampliam a visualização e análise do espaço."},{"t":"Cartografia e recursos","q":"Gráficos, vídeos e fotografias tornam o ensino mais:","o":["Atrativo","A ser evitado","Substituto do professor","Exclusivo do ensino superior"],"c":0,"w":"São recursos que tornam o ensino mais atrativo."},{"t":"Cartografia e recursos","q":"Interpretar um mapa exige relacionar:","o":["Símbolos, legenda, escala e orientação","Apenas as cores","Somente o título","Apenas a data"],"c":0,"w":"A leitura de mapa articula legenda, escala, símbolos e orientação."},{"t":"Metodologias ativas","q":"São exemplos de metodologias ativas citadas no resumo:","o":["Trabalhos em grupo, jogos, aprendizagem por projetos/problemas e debates","Apenas aula expositiva","Somente provas","Cópia do quadro"],"c":0,"w":"O resumo lista trabalhos em grupo, jogos, ABP e debates."},{"t":"Metodologias ativas","q":"As metodologias ativas tornam as aulas mais:","o":["Dinâmicas, críticas e significativas","Cansativas e passivas","Longas e teóricas","Memorísticas"],"c":0,"w":"O resumo afirma: tornam as aulas mais dinâmicas, críticas e significativas."},{"t":"Metodologias ativas","q":"Nas metodologias ativas, o aluno é:","o":["Protagonista do próprio aprendizado","Receptor passivo","Mero ouvinte","Espectador"],"c":0,"w":"A centralidade passa para o aluno, que participa ativamente da construção do saber."},{"t":"Metodologias ativas","q":"Na aprendizagem baseada em problemas (ABP), parte-se de:","o":["Uma situação-problema real a ser investigada","Uma prova final","Uma aula expositiva longa","Listas a memorizar"],"c":0,"w":"A ABP organiza o aprendizado em torno de uma situação-problema a investigar."},{"t":"Metodologias ativas","q":"Debates sobre questões ambientais desenvolvem no aluno principalmente:","o":["Pensamento crítico e argumentação","Apenas memória","Passividade","Desinteresse"],"c":0,"w":"Debater forma senso crítico e capacidade de argumentar sobre o espaço."},{"t":"Metodologias ativas","q":"Jogos educativos no ensino de geografia favorecem:","o":["Aprendizagem lúdica e engajamento","Exclusão dos alunos","Repetição mecânica","Afastamento do conteúdo"],"c":0,"w":"O lúdico aumenta o engajamento e dá sentido ao conteúdo geográfico."},{"t":"Metodologias ativas","q":"Nas metodologias ativas, o professor é:","o":["Mediador que orienta a construção do conhecimento","Único transmissor de conteúdo","Avaliador de provas","Mantenedor da passividade"],"c":0,"w":"O professor atua como mediador/orientador, não como mero transmissor."},{"t":"Metodologias ativas","q":"A geografia crítica defende um ensino que leve o aluno a:","o":["Compreender e questionar a realidade socioespacial","Apenas descrever paisagens","Memorizar sem reflexão","Ignorar as desigualdades"],"c":0,"w":"A geografia crítica busca compreender e problematizar o espaço e suas desigualdades."},{"t":"Metodologias ativas","q":"Relacionar geografia a questões socioambientais contribui para formar:","o":["Cidadãos críticos e conscientes","Alunos alienados","Estudantes desinteressados","Apenas técnicos em mapas"],"c":0,"w":"A abordagem socioambiental forma cidadania crítica e consciente."},{"t":"Metodologias ativas","q":"O uso combinado de metodologias ativas e tecnologia tem como objetivo:","o":["Ensino mais atrativo, significativo e próximo da realidade do aluno","Substituir o professor","Aumentar memorização","Reduzir participação dos alunos"],"c":0,"w":"O objetivo é um ensino mais atrativo, significativo e conectado à vida do estudante."}];

var idx=0,sel=null,answered=false,score=0,results=[];

function letra(i){return String.fromCharCode(65+i);}

function render(){
  var app=document.getElementById('app');
  if(idx>=Q.length){
    // resultado
    var pct=Math.round((score/Q.length)*100);
    var msg=pct>=85?"Excelente! Você domina o conteúdo.":pct>=70?"Bom desempenho! Reforce os pontos fracos.":pct>=50?"No caminho! Revise antes da prova.":"Hora de rever o resumo com calma.";
    var byT={};
    results.forEach(function(r){if(!byT[r.t])byT[r.t]={ok:0,n:0};byT[r.t].n++;if(r.ok)byT[r.t].ok++;});
    var trows='';
    Object.keys(byT).forEach(function(t){
      var p=Math.round((byT[t].ok/byT[t].n)*100);
      var cor=p>=70?'#2E8B6B':p>=50?'#D9831A':'#CC4636';
      trows+='<div class="trow"><div class="tnome">'+t+'</div><div class="tbar"><div class="tfill" style="width:'+p+'%;background:'+cor+'"></div></div><div class="tsc">'+byT[t].ok+'/'+byT[t].n+'</div></div>';
    });
    app.innerHTML='<div class="resultado"><div class="big">'+score+'<small>/'+Q.length+'</small></div><div style="font-size:13px;color:#736B5E;font-weight:700;margin-top:4px">'+pct+'% de acerto</div><p class="rmsg">'+msg+'</p></div><div class="card"><div class="sub">Desempenho por tópico</div>'+trows+'<button class="btn" onclick="reiniciar()">Refazer o quiz</button></div><div class="foot">Estude com a Mimi! 🐕</div>';
    return;
  }
  var q=Q[idx];
  var prog=Math.round(((idx+(answered?1:0))/Q.length)*100);
  var opts='';
  q.o.forEach(function(o,i){
    var cls='opt';
    if(answered){if(i===q.c)cls+=' certo';else if(i===sel)cls+=' errado';else cls+=' dim';}
    opts+='<button class="'+cls+'" '+(answered?'disabled':'')+' onclick="escolher('+i+')"><span class="letra">'+letra(i)+'</span><span>'+o+'</span></button>';
  });
  var fb='';
  if(answered){
    var ok=sel===q.c;
    var img=ok?'Captura de tela 2026-06-18 164424.png':'Captura de tela 2026-06-18 164141.png';
    var titulo=ok?'🎉 Você Acertou!':'❌ Você Errou';
    fb='<div class="feedback '+(ok?'ok':'no')+'"><img src="'+img+'" alt="feedback"><div class="fhead">'+titulo+'</div><div class="fcorreto">Resposta correta: '+letra(q.c)+'</div><div class="fwhy">'+q.w+'</div></div><button class="btn" onclick="proximo()">'+(idx+1>=Q.length?'Ver resultado':'Próxima questão →')+'</button>';
  }
  app.innerHTML='<div class="sub">Preparação para a prova</div><h1>Fundamentos de Geografia</h1><div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px"><div class="progress-row" style="flex:1;margin:0"><div class="bar"><div class="fill" style="width:'+prog+'%"></div></div><span class="lbl">'+(idx+1)+'/'+Q.length+'</span></div><span class="score">✓ '+score+'/'+Q.length+'</span></div><div class="card"><div class="topic"><span class="qnum">Questão '+(idx+1)+'</span> · '+q.t+'</div><div class="question">'+q.q+'</div>'+opts+fb+'</div><div class="foot">'+(answered?'Leia a explicação e continue.':'Toque na alternativa correta.')+'</div>';
}

function escolher(i){
  if(answered)return;
  sel=i;answered=true;
  var ok=i===Q[idx].c;
  if(ok)score++;
  results.push({t:Q[idx].t,ok:ok});
  render();
}

function proximo(){
  idx++;sel=null;answered=false;render();
}

function reiniciar(){
  idx=0;sel=null;answered=false;score=0;results=[];render();
}

render();
</script>
</body>
</html>
