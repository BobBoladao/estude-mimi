<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body.hard h1{color:#FFE4E4}
.modo-badge{display:none;background:#CC0000;color:#fff;font-size:13px;font-weight:900;letter-spacing:.25em;text-transform:uppercase;padding:8px 20px;border-radius:99px;margin-bottom:14px;text-align:center;animation:pulse 1.5s infinite}

.bar{flex:1;height:7px;border-radius:99px;overflow:hidden}

body.hard .card{background:#3D0F0F;border:1px solid #8B0000}

.qnum{font-weight:800}

body.normal .question{color:#26221B}
body.hard .question{color:#FFE4E4}
.opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;border-radius:12px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;line-height:1.35;transition:border-color .1s,background .1s}
body.normal .opt{background:#fff;border:1.5px solid #EDE4D3;color:#26221B}

body.hard .letra{background:#5C1A1A;border:1px solid #8B0000;color:#FF9999}

.opt.certo .letra{background:#2E8B6B!important;color:#fff!important;border-color:#2E8B6B!important}

.feedback{margin-top:8px;border-radius:12px;padding:14px;text-align:center}

.fcorreto{font-size:13px;font-weight:700;margin-top:4px;text-align:left;color:#333}
.btn{margin-top:14px;width:100%;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}

.big{font-family:Georgia,serif;font-size:56px;font-weight:700;line-height:1}

.rmsg{font-size:15px;margin:10px 0 24px;line-height:1.4}

body.hard .rmsg{color:#FFE4E4}
.trow{display:flex;align-items:center;gap:8px;padding:10px 0}
body.normal .trow{border-top:1px solid #EDE4D3}
body.hard .trow{border-top:1px solid #5C1A1A}
.trow:last-child{border-bottom:1px solid #EDE4D3}
body.hard .trow:last-child{border-bottom:1px solid #5C1A1A}
.tnome{flex:1;font-size:13px;font-weight:600}
body.normal .tnome{color:#26221B}
body.hard .tnome{color:#FFE4E4}
.tbar{width:80px;height:5px;border-radius:99px;overflow:hidden}
body.normal .tbar{background:#EDE4D3}
body.hard .tbar{background:#5C1A1A}

.tsc{font-size:12px;font-weight:700}
body.normal .tsc{color:#736B5E}
body.hard .tsc{color:#FF9999}
.foot{text-align:center;font-size:12px;margin-top:16px}
body.normal .foot{color:#736B5E}
body.hard .foot{color:#FF9999}
.banner{border-radius:16px;padding:30px 20px;text-align:center;margin-bottom:20px}
body.hard .banner{background:#3D0F0F;border:2px solid #FF0000;box-shadow:0 0 30px rgba(255,0,0,.3)}
.banner-emoji{font-size:48px;margin-bottom:12px}
.banner-titulo{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-bottom:10px;color:#FF4444}
.banner-desc{font-size:14px;line-height:1.6;color:#FF9999}
</style>

<script>
// c = índice da resposta correta (0=A, 1=B, 2=C, 3=D)
// Distribuição propositalmente variada e balanceada
var EASY=[
{t:"Espaço vivido",q:"Qual é o ponto de partida indicado para o ensino de geografia nos anos iniciais?",o:["O estudo do espaço sideral","O espaço global e as fronteiras internacionais","O espaço vivido, as relações sociais e o cotidiano da criança","A memorização de capitais e países"],c:2,w:"O ensino deve partir do próximo e concreto — o espaço que a criança conhece e vivencia."},
{t:"BNCC",q:"A BNCC propõe que o ensino de geografia relacione a experiência cotidiana do estudante a:",o:["A leitura do mundo e do espaço","A memorização de conteúdos teóricos","A cartografia avançada exclusivamente","O estudo de países estrangeiros"],c:0,w:"A BNCC conecta a vivência do aluno à leitura crítica do mundo e do espaço."},
{t:"Cartografia",q:"Pedir que alunos desenhem o caminho de casa até a escola é um exemplo de:",o:["Avaliação somativa tradicional","Aula expositiva","Memorização cartográfica","Alfabetização cartográfica por meio do croqui"],c:3,w:"O desenho do trajeto desenvolve a representação espacial — base da alfabetização cartográfica."},
{t:"Espaço geográfico",q:"Comparar fotografias antigas do bairro com imagens atuais desenvolve a compreensão de:",o:["Regras ortográficas aplicadas à descrição","As transformações do espaço geográfico ao longo do tempo","Cálculo de escala numérica","A distribuição climática regional"],c:1,w:"A comparação temporal de imagens evidencia o dinamismo do espaço geográfico."},
{t:"Didática",q:"Na perspectiva didática, partir do 'espaço vivido' significa:",o:["Ir do abstrato ao concreto","Usar apenas mapas globais","Partir do concreto e próximo em direção ao abstrato e distante","Ignorar a realidade local do aluno"],c:2,w:"O percurso vai do concreto/próximo (o lugar do aluno) ao abstrato/distante (o mundo)."},
{t:"Cartografia",q:"Na alfabetização cartográfica, o croqui é:",o:["Um mapa oficial com escala precisa e legenda técnica","Um esboço simplificado que representa o espaço","Uma fotografia aérea em alta resolução","Um sistema de coordenadas geográficas"],c:1,w:"Croqui é um esboço simplificado — primeiro passo da representação cartográfica escolar."},
{t:"BNCC",q:"Entre os objetivos centrais da BNCC para a geografia escolar está o desenvolvimento do:",o:["Cálculo diferencial aplicado ao espaço","Raciocínio geográfico","Pensamento histórico cronológico","Raciocínio exclusivamente matemático"],c:1,w:"O raciocínio geográfico é a habilidade central proposta pela BNCC para a geografia."},
{t:"Espaço geográfico",q:"Trabalhar com fotografias do bairro em diferentes épocas ajuda o aluno a compreender que o espaço é:",o:["Neutro e sem interferência humana","Imutável ao longo do tempo","Apenas uma extensão física mensurável","Dinâmico e continuamente transformado pela sociedade"],c:3,w:"O espaço é produzido e transformado socialmente — não é estático nem neutro."},
{t:"BNCC",q:"A 'leitura do mundo e do espaço' proposta pela BNCC pressupõe que o aluno:",o:["Compreenda e interprete criticamente a realidade ao seu redor","Apenas decore capitais e fronteiras","Copie mapas com precisão técnica","Ignore sua experiência cotidiana"],c:0,w:"Ler o mundo é compreender e interpretar criticamente a realidade espacial vivida."},
{t:"Didática",q:"Valorizar o cotidiano da criança no ensino de geografia é importante porque:",o:["Substitui completamente os conteúdos conceituais","Impede que o aluno aprenda cartografia formal","Afasta o conteúdo da vida real","Dá sentido ao aprendizado, partindo do que o aluno já conhece"],c:3,w:"O cotidiano é âncora do aprendizado — conecta o novo ao conhecido, dando significado."},
{t:"Paisagem",q:"Em geografia, a paisagem pode ser definida como:",o:["O conjunto de leis que regem um território","O espaço vivido com afetividade e memória","Tudo aquilo que pode ser percebido pelos sentidos em determinado espaço","O espaço delimitado por relações de poder"],c:2,w:"Paisagem = percepção sensorial do espaço: o que se vê, ouve, sente em determinado lugar."},
{t:"Paisagem",q:"O exemplo usado no resumo para ilustrar o conceito de paisagem é:",o:["A casa de família","O Brasil como nação","A cachoeira","A praça do bairro"],c:2,w:"O resumo usa a cachoeira como exemplo clássico de paisagem natural."},
{t:"Lugar",q:"O conceito geográfico de lugar está essencialmente associado a:",o:["Relações de poder e controle territorial","Delimitação política e administrativa","Percepção visual do ambiente","Experiência vivida, afetividade e sentimento de pertencimento"],c:3,w:"Lugar é o espaço carregado de significado, memória, afeto e identidade."},
{t:"Lugar",q:"No resumo estudado, o exemplo utilizado para o conceito de lugar é:",o:["A casa","O Brasil","A cachoeira","A cidade"],c:0,w:"A casa é exemplo de lugar por ser um espaço de experiência, afeto e pertencimento."},
{t:"Território",q:"O que caracteriza fundamentalmente o conceito de território na geografia é:",o:["A percepção sensorial do ambiente","A afetividade com o espaço vivido","As relações de poder, controle e delimitação de um grupo ou Estado","A paisagem natural preservada"],c:2,w:"Território = espaço apropriado e controlado por meio de relações de poder."},
{t:"Território",q:"No resumo estudado, qual exemplo ilustra o conceito de território?",o:["A cachoeira","A casa","A praça","O Brasil"],c:3,w:"O Brasil é exemplo de território — espaço delimitado e controlado por um Estado soberano."},
{t:"Território",q:"O que diferencia o território das outras categorias geográficas de forma mais precisa é:",o:["A beleza da paisagem natural","A memória afetiva coletiva","As relações de poder, controle e delimitação","A percepção multissensorial do espaço"],c:2,w:"O território se define pelas relações de poder que controlam e delimitam o espaço."},
{t:"Lugar",q:"A categoria geográfica mais diretamente ligada ao sentimento de pertencimento e à identidade é:",o:["Região","Território","Lugar","Paisagem"],c:2,w:"Lugar é a categoria do vínculo afetivo, da identidade e do pertencimento (topofilia)."},
{t:"Conceitos",q:"Entre lugar e território, a diferença fundamental é que:",o:["Lugar é urbano e território é rural","Lugar é maior que território","Lugar envolve afeto e vivência; território envolve poder e controle","Território é subjetivo e lugar é objetivo"],c:2,w:"Lugar = experiência afetiva; território = poder e controle sobre o espaço."},
{t:"Paisagem",q:"A classificação mais comum da paisagem na geografia escolar é:",o:["Urbana e rural","Natural e cultural (humanizada)","Antiga e moderna","Pública e privada"],c:1,w:"Paisagem natural (pouca interferência humana) x cultural/humanizada (transformada pela sociedade)."},
{t:"Paisagem",q:"Uma área urbana com prédios, viadutos e indústrias é classificada como paisagem:",o:["Natural preservada","Mista e transitória","Cultural ou humanizada","Primitiva em transformação"],c:2,w:"A intensa ação humana caracteriza a paisagem cultural/humanizada."},
{t:"Espaço geográfico",q:"Para Milton Santos, o espaço geográfico é compreendido como:",o:["O território político de um Estado-nação","A paisagem natural de uma região","A soma dos lugares de um país","Um conjunto indissociável de sistemas de objetos e sistemas de ações"],c:3,w:"Milton Santos: espaço = sistemas de objetos + sistemas de ações, indissociáveis."},
{t:"Região",q:"A categoria geográfica 'região' pode ser definida como:",o:["O espaço de afetividade individual","Qualquer área com fronteiras políticas definidas","Uma porção do espaço com características comuns que a diferenciam e lhe dão unidade","O território controlado por um governo local"],c:2,w:"Região = porção do espaço com traços comuns (físicos, sociais, econômicos) que a singularizam."},
{t:"Território",q:"A noção de território está mais diretamente associada ao conceito de:",o:["Topofilia","Escala cartográfica","Poder","Paisagem cultural"],c:2,w:"Território e poder são indissociáveis — controle e domínio sobre o espaço."},
{t:"Paisagem",q:"Dizer que a paisagem é 'dinâmica' significa que ela:",o:["Permanece imutável ao longo dos séculos","Depende exclusivamente do clima para se transformar","Existe apenas na percepção subjetiva do observador","Se transforma continuamente por processos naturais e pela ação humana"],c:3,w:"A paisagem muda: processos naturais e a sociedade a transformam continuamente."},
{t:"Lugar",q:"No ensino de geografia, estudar o 'lugar' é relevante principalmente porque:",o:["Permite memorizar dados geográficos com mais facilidade","Substitui o estudo de outras categorias espaciais","Conecta o conteúdo à vivência, identidade e pertencimento do aluno","Facilita apenas a leitura de mapas locais"],c:2,w:"O lugar liga o conteúdo à experiência real do aluno — ponto de partida do aprendizado."},
{t:"Cartografia",q:"A principal função dos mapas no ensino de geografia é:",o:["Decorar e reproduzir paisagens com precisão artística","Substituir as saídas de campo","Memorizar a localização de países","Auxiliar na compreensão do espaço, localização e interpretação de informações"],c:3,w:"Mapas são instrumentos de leitura e análise espacial — não apenas ilustrações."},
{t:"Recursos didáticos",q:"Segundo o resumo, as imagens facilitam especialmente a análise de:",o:["Dados econômicos e estatísticos","Fórmulas e cálculos geográficos","Paisagens e aspectos sociais, culturais e ambientais","Regras gramaticais da descrição geográfica"],c:2,w:"Imagens permitem analisar paisagens e fenômenos sociais, culturais e ambientais."},
{t:"Cartografia",q:"A alfabetização cartográfica visa formar alunos capazes de:",o:["Apenas colorir mapas prontos fornecidos pelo professor","Memorizar a localização de capitais e rios","Ler, interpretar e produzir representações do espaço","Reproduzir mapas com precisão técnica"],c:2,w:"Alfabetização cartográfica = leitura, interpretação e produção de representações espaciais."},
{t:"Cartografia",q:"A escala cartográfica expressa:",o:["A direção dos ventos na região mapeada","A relação proporcional entre as medidas do mapa e as da realidade","O número de habitantes de um território","A temperatura média de uma região"],c:1,w:"Escala = proporção entre distância representada no mapa e distância real no terreno."},
{t:"Cartografia",q:"Em relação a um mapa na escala 1:10.000, um mapa 1:100.000:",o:["Mostra a mesma área com o mesmo nível de detalhe","Mostra área menor com detalhes maiores","Representa área menor mas com mais informações","Mostra área maior com menos detalhes"],c:3,w:"Maior denominador = menor escala = maior área representada, porém com menos detalhamento."},
{t:"Cartografia",q:"Entre os elementos essenciais que um mapa deve conter estão:",o:["Apenas as cores e a projeção utilizada","Título, legenda, escala e orientação","Somente o título e a fonte","Fotografias e gráficos complementares"],c:1,w:"Todo mapa completo precisa de título, legenda, escala e orientação (rosa dos ventos)."},
{t:"Cartografia",q:"A legenda de um mapa tem como função principal:",o:["Indicar o autor e a data de publicação","Mostrar a escala numérica","Substituir o título quando necessário","Explicar o significado dos símbolos e cores utilizados"],c:3,w:"A legenda decodifica os símbolos e cores — sem ela, o mapa não pode ser lido."},
{t:"Cartografia",q:"A rosa dos ventos em um mapa serve para indicar:",o:["A velocidade dos ventos na região","A escala gráfica","A orientação e os pontos cardeais","A temperatura média"],c:2,w:"Rosa dos ventos = orientação espacial, indicando os pontos cardeais (N, S, L, O)."},
{t:"Cartografia",q:"A 'visão vertical' ou perspectiva de cima para baixo é a base para a construção de:",o:["Fotografias panorâmicas","Maquetes tridimensionais","Croquis afetivos de memória","Mapas e plantas"],c:3,w:"Mapas e plantas usam a projeção vertical — visão zenithal do espaço."},
{t:"Recursos didáticos",q:"A maquete como recurso didático no ensino de geografia contribui para:",o:["A memorização de dados estatísticos","A leitura de textos geográficos","Compreender a tridimensionalidade e a representação do relevo","A decoração da sala de aula"],c:2,w:"A maquete trabalha a noção de volume, relevo e a transição do 3D para o 2D dos mapas."},
{t:"Metodologia",q:"O trabalho de campo no ensino de geografia tem como principal contribuição:",o:["Substituir completamente os conteúdos do livro didático","Servir como atividade recreativa sem objetivos pedagógicos","Observar e analisar o espaço real, articulando teoria e prática","Avaliar os alunos de forma informal"],c:2,w:"O trabalho de campo conecta a teoria à observação direta do espaço real."},
{t:"Tecnologia",q:"O uso de ferramentas como Google Earth e SIG no ensino de geografia contribui para:",o:["Substituir o professor nas explicações","Eliminar a necessidade de mapas impressos","A visualização e análise espacial em múltiplas escalas","Apenas entreter os alunos"],c:2,w:"SIG e Google Earth ampliam a capacidade de visualização e análise do espaço geográfico."},
{t:"Recursos didáticos",q:"Gráficos, vídeos e fotografias são mencionados no resumo como recursos que:",o:["Substituem completamente o professor","Tornam o ensino de geografia mais atrativo e significativo","Devem ser evitados no ensino fundamental","São exclusivos do ensino superior"],c:1,w:"Esses recursos diversificam o ensino, tornando-o mais dinâmico e próximo da realidade."},
{t:"Cartografia",q:"A leitura eficiente de um mapa exige que o aluno articule:",o:["Apenas a legenda e o título","Somente a escala e a fonte","Símbolos, legenda, escala e orientação simultaneamente","Apenas as cores predominantes"],c:2,w:"A leitura cartográfica plena integra todos os elementos: legenda, escala, símbolos e orientação."},
{t:"Metodologias ativas",q:"São exemplos de metodologias ativas no ensino de geografia, segundo o resumo:",o:["Apenas aula expositiva e ditado de conteúdos","Trabalhos em grupo, jogos educativos, ABP e debates","Cópia de mapas e memorização de capitais","Somente aplicação de provas objetivas"],c:1,w:"Metodologias ativas incluem trabalho em grupo, jogos, ABP e debates — o aluno participa ativamente."},
{t:"Metodologias ativas",q:"O efeito das metodologias ativas sobre as aulas de geografia, segundo o resumo, é torná-las mais:",o:["Longas, expositivas e centradas no professor","Memorizativas e baseadas em repetição","Dinâmicas, críticas e significativas","Padronizadas e controladas"],c:2,w:"Metodologias ativas geram aulas mais dinâmicas, reflexivas e significativas para o aluno."},
{t:"Metodologias ativas",q:"Nas metodologias ativas, qual é o papel central do aluno?",o:["Receptor passivo que escuta e anota","Espectador que observa o professor","Copiador de conteúdos pré-formatados","Protagonista que constrói ativamente o próprio conhecimento"],c:3,w:"O aluno é protagonista — a aprendizagem ativa desloca o centro do professor para o estudante."},
{t:"ABP",q:"A Aprendizagem Baseada em Problemas (ABP) estrutura-se a partir de:",o:["Uma prova dissertativa ao final do bimestre","Uma situação-problema real que mobiliza investigação e busca de soluções","Uma aula expositiva seguida de exercícios fixadores","Listas de conteúdos a serem memorizados"],c:1,w:"A ABP organiza o aprendizado em torno de um problema real, estimulando investigação e crítica."},
{t:"Metodologias ativas",q:"Debates sobre questões ambientais e sociais no ensino de geografia desenvolvem principalmente:",o:["A memorização de dados e estatísticas","A passividade e a escuta","O pensamento crítico e a capacidade de argumentação","A cópia organizada de conteúdos"],c:2,w:"O debate forma cidadãos capazes de argumentar e pensar criticamente sobre o espaço."},
{t:"Metodologias ativas",q:"Os jogos educativos no ensino de geografia contribuem especialmente para:",o:["A repetição mecânica de conteúdos","A aprendizagem lúdica e o engajamento dos alunos","A exclusão dos alunos com dificuldades","O afastamento do conteúdo curricular"],c:1,w:"O lúdico aumenta o engajamento e dá sentido ao conteúdo geográfico."},
{t:"Metodologias ativas",q:"Nas metodologias ativas, o professor assume o papel de:",o:["Único detentor e transmissor do conhecimento","Avaliador exclusivo por meio de provas","Mediador que orienta e apoia a construção do conhecimento","Mantenedor da passividade e da ordem"],c:2,w:"O professor mediador orienta, problematiza e apoia — não apenas transmite conteúdo."},

{t:"Pensadores",q:"O conceito de 'topofilia', desenvolvido por Yi-Fu Tuan, relaciona-se mais diretamente à categoria geográfica de:",o:["Território","Região","Paisagem","Lugar"],c:3,w:"Topofilia (vínculo afetivo com o espaço) é a base da categoria 'lugar' na geografia humanista."},
{t:"Pensadores",q:"Henri Lefebvre propôs que o espaço é uma produção social estruturada em três dimensões. Qual delas corresponde ao espaço das práticas cotidianas materiais?",o:["Espaço concebido (representações do espaço)","Espaço vivido (espaços de representação)","Espaço percebido (práticas espaciais)","Espaço imaginado (utopias espaciais)"],c:2,w:"Espaço percebido = práticas espaciais cotidianas, o espaço material e vivido no dia a dia."},
{t:"Pensadores",q:"David Harvey, ao analisar a globalização, desenvolveu o conceito de compressão espaço-tempo para explicar:",o:["O aumento das fronteiras nacionais no século XXI","Como o capital e a tecnologia encurtam distâncias e aceleram os fluxos","A preservação das identidades locais frente à globalização","O crescimento das cidades em extensão territorial"],c:1,w:"Harvey: capital e tecnologia comprimem espaço e tempo — o mundo parece encolher."},
{t:"Conceitos avançados",q:"O conceito de 'não-lugar', de Marc Augé, caracteriza-se por:",o:["Ser um espaço com forte identidade histórica e afetiva","Ser um espaço de passagem sem identidade, relação ou história","Corresponder ao espaço rural desprovido de equipamentos","Ser sinônimo de lugar na perspectiva humanista"],c:1,w:"Não-lugar (aeroporto, shopping): espaço de passagem sem identidade, relação ou memória coletiva."},
{t:"Conceitos avançados",q:"O processo de desterritorialização, frequentemente associado à globalização, refere-se a:",o:["A criação de novos territórios mais sólidos","O enfraquecimento ou dissolução dos vínculos territoriais tradicionais","O fortalecimento das identidades locais","A delimitação precisa de fronteiras nacionais"],c:1,w:"Desterritorialização: globalização fragiliza vínculos territoriais — culturas, identidades e fronteiras se flexibilizam."},
{t:"Conceitos avançados",q:"Na tríade de Lefebvre, o 'espaço concebido' corresponde a:",o:["O espaço vivido com afeto e memória","As práticas espaciais cotidianas","As representações do espaço produzidas por planejadores, arquitetos e técnicos","O espaço das manifestações artísticas e culturais"],c:2,w:"Espaço concebido = representações técnicas e científicas do espaço (mapas, projetos, planos)."},
{t:"Urbanização",q:"A segregação socioespacial urbana é um fenômeno que resulta principalmente de:",o:["Escolhas individuais e preferências pessoais de moradia","A desigualdade de renda que determina o acesso diferenciado ao espaço urbano","O crescimento natural da população sem planejamento","A ausência de legislação urbanística"],c:1,w:"A segregação reflete a desigualdade de renda — grupos sociais são separados no espaço urbano."},
{t:"Urbanização",q:"O processo de gentrificação produz como consequência principal:",o:["A democratização do acesso à moradia nas áreas centrais","A permanência e valorização dos moradores originais","A revalorização de áreas com consequente expulsão de moradores de menor renda","A criação de novas centralidades periféricas"],c:2,w:"Gentrificação: especulação imobiliária eleva preços e expulsa populações vulneráveis das áreas requalificadas."},
{t:"Geopolítica",q:"O conceito de soberania territorial implica que um Estado possui:",o:["Apenas controle das fronteiras terrestres","Poder exclusivo e supremo sobre seu território, habitantes e recursos","Autoridade compartilhada com organismos internacionais","Soberania apenas sobre o espaço aéreo"],c:1,w:"Soberania: poder exclusivo e legítimo do Estado sobre seu território — base do sistema internacional."},
{t:"Geopolítica",q:"As fronteiras políticas entre países são compreendidas pela geografia crítica como:",o:["Limites naturais e imutáveis dados pela natureza","Construções históricas e políticas que delimitam territórios e podem gerar conflitos","Linhas cartográficas sem significado social real","Acordos permanentes e consensuais entre nações"],c:1,w:"Fronteiras são construídas histórica e politicamente — são instáveis, conflitivas e negociadas."},
{t:"Geopolítica",q:"A globalização, numa perspectiva crítica, deve ser compreendida como:",o:["Processo neutro e uniformizador que beneficia igualmente todos os países","Fenômeno exclusivamente cultural e comunicacional","Processo contraditório que integra e exclui, homogeneíza e fragmenta simultaneamente","Etapa final e positiva do desenvolvimento capitalista"],c:2,w:"A globalização é contraditória: integra mercados e exclui populações; homogeneíza e fragmenta culturas."},
{t:"Avaliação",q:"A principal diferença entre avaliação diagnóstica e avaliação formativa é:",o:["Diagnóstica usa provas; formativa usa portfólios","São instrumentos idênticos com nomes diferentes","Diagnóstica identifica conhecimentos prévios antes do processo; formativa acompanha e regula o processo contínuo","Formativa ocorre no início e diagnóstica no final"],c:2,w:"Diagnóstica: mapa inicial do que o aluno sabe. Formativa: regulação contínua durante o processo."},
{t:"Avaliação",q:"O uso de rubricas como instrumento avaliativo no ensino de geografia tem como principal vantagem:",o:["Eliminar completamente a subjetividade da avaliação","Reduzir o tempo de correção","Definir critérios claros e transparentes para alunos e professores, tornando a avaliação mais justa","Substituir todas as outras formas de avaliação"],c:2,w:"Rubricas explicitam critérios — alunos sabem o que é esperado e professores avaliam com mais coerência."},
{t:"Pedagogia",q:"A pedagogia histórico-crítica de Saviani, aplicada ao ensino de geografia, propõe que a prática pedagógica siga o movimento:",o:["Conteúdo → exercício → memorização → prova","Motivação → apresentação → assimilação → fixação","Prática social inicial → problematização → instrumentalização → catarse → prática social transformada","Diagnóstico → planejamento → execução → avaliação somativa"],c:2,w:"Saviani: partir da prática social, problematizar, instrumentalizar teoricamente e retornar à prática transformada."},
{t:"Pedagogia",q:"O conceito de Zona de Desenvolvimento Proximal (ZDP), de Vigotsky, aplicado ao ensino de geografia, implica que:",o:["O aluno deve aprender apenas o que já sabe fazer sozinho","O professor deve evitar interferir no aprendizado autônomo","A mediação do professor ou dos pares permite ao aluno avançar além do que conseguiria individualmente","A aprendizagem ocorre exclusivamente por condicionamento e repetição"],c:2,w:"ZDP: a mediação permite ao aluno superar seus limites atuais — base do ensino como intervenção."},
{t:"Pedagogia",q:"Paulo Freire contribui para o ensino de geografia ao defender a educação como:",o:["Transmissão neutra de conteúdos científicos acumulados","Treinamento técnico para o mercado de trabalho","Ato político de leitura crítica do mundo, que inclui a leitura do espaço","Adaptação do indivíduo às normas sociais estabelecidas"],c:2,w:"Freire: educação é leitura crítica do mundo — e o espaço geográfico é parte fundamental desse mundo."},
{t:"Cartografia social",q:"A cartografia social distingue-se da cartografia técnica convencional por:",o:["Usar tecnologias mais avançadas e precisas","Ser produzida exclusivamente por institutos governamentais","Valorizar os saberes, perspectivas e territórios das comunidades na representação espacial","Focar apenas em dados quantitativos e demográficos"],c:2,w:"Cartografia social: as próprias comunidades representam seu espaço — perspectiva crítica e participativa."},
{t:"Tecnologia",q:"Os Sistemas de Informação Geográfica (SIG) diferenciam-se dos mapas convencionais por:",o:["Serem menos precisos e mais acessíveis","Representarem apenas dados físicos do terreno","Permitirem sobreposição, análise e atualização dinâmica de múltiplas camadas de informação espacial","Serem ferramentas exclusivas de uso militar"],c:2,w:"SIG: múltiplas camadas de dados espaciais sobrepostas e analisáveis dinamicamente — muito além do mapa estático."},
{t:"Diversidade",q:"A perspectiva decolonial no ensino de geografia propõe, entre outras coisas:",o:["Manter o eurocentrismo como referência curricular universal","Ignorar a história colonial na análise dos territórios","Questionar o eurocentrismo e valorizar epistemes, saberes e perspectivas de povos historicamente marginalizados","Substituir todo o conteúdo geográfico por história das colonizações"],c:2,w:"Decolonialidade: questiona hierarquias de saber eurocêntricas e valoriza perspectivas subalternizadas."},
{t:"Diversidade",q:"A educação do campo, na perspectiva da geografia crítica, reivindica:",o:["Que alunos rurais estudem exclusivamente temas urbanos para se integrar","A extinção das diferenças entre campo e cidade no currículo","Uma educação contextualizada na identidade, nos saberes e na realidade territorial do campo","A aplicação do mesmo currículo urbano no campo sem adaptações"],c:2,w:"Educação do campo: currículo enraizado na realidade, identidade e luta dos povos do campo."},
{t:"Ambiente",q:"O conceito de pegada ecológica é utilizado no ensino de geografia para:",o:["Medir a extensão física das cidades","Calcular a velocidade de crescimento populacional","Avaliar o impacto do consumo humano sobre os recursos naturais e a capacidade do planeta","Estimar a área de florestas preservadas por país"],c:2,w:"Pegada ecológica: área necessária para sustentar o consumo de uma população e absorver seus resíduos."},
{t:"Ambiente",q:"No ensino de geografia, a distinção entre 'tempo meteorológico' e 'clima' é fundamental porque:",o:["São termos científicos intercambiáveis","Tempo é estudado pela física e clima pela química","Tempo é o estado atmosférico momentâneo; clima é o padrão atmosférico de longo prazo de uma região","Clima se refere ao passado e tempo ao futuro"],c:2,w:"Tempo = condição atmosférica atual (vai chover hoje?). Clima = padrão de décadas (qual o regime de chuvas da região?)."},
{t:"Ambiente",q:"O conceito de desenvolvimento sustentável pressupõe, em sua formulação clássica:",o:["Crescimento econômico ilimitado com compensação ambiental posterior","Preservação ambiental total sem qualquer desenvolvimento","Atender às necessidades do presente sem comprometer a capacidade das gerações futuras de atender às suas próprias","Priorizar o desenvolvimento dos países pobres em detrimento dos ricos"],c:2,w:"Brundtland (1987): sustentabilidade = equilíbrio entre necessidades presentes e preservação para o futuro."},
{t:"Urbanização",q:"As ilhas de calor urbanas resultam principalmente de:",o:["Excesso de áreas verdes nas cidades","Fenômenos naturais de inversão térmica exclusivamente","Alta concentração de superfícies impermeáveis, construções e emissão de calor antrópico nas cidades","Baixa densidade demográfica nas periferias"],c:2,w:"Ilhas de calor: urbanização densa com pavimento, edificações e calor antrópico eleva temperatura local."},
{t:"Urbanização",q:"A conurbação é um processo que se caracteriza por:",o:["A divisão de uma grande cidade em municípios menores","O esvaziamento populacional das áreas metropolitanas","A fusão das malhas urbanas de cidades vizinhas formando uma continuidade territorial","A criação de bairros planejados em áreas rurais"],c:2,w:"Conurbação: cidades crescem até suas periferias se tocarem e se fundirem em mancha urbana contínua."},
{t:"Urbanização",q:"O conceito de 'direito à cidade', formulado por Henri Lefebvre, reivindica:",o:["Que apenas proprietários tenham voz nas decisões urbanas","A privatização dos espaços públicos para melhor gestão","A mercantilização completa do solo urbano","O acesso igualitário de todos os cidadãos aos espaços, serviços e às decisões sobre a cidade"],c:3,w:"Direito à cidade: a cidade deve ser para todos — não apenas para quem pode pagar por ela."},
{t:"Metodologia",q:"A webquest como estratégia pedagógica no ensino de geografia caracteriza-se por:",o:["Uma competição online entre escolas","Uma prova realizada em laboratório de informática","Uma pesquisa orientada, estruturada e crítica utilizando recursos da internet","Um jogo digital de localização geográfica"],c:2,w:"Webquest: pesquisa orientada pelo professor com fontes previamente selecionadas — análise, não navegação aleatória."},
{t:"Cartografia",q:"A pluriescalaridade na análise geográfica significa:",o:["Usar apenas mapas em pequena escala","Estudar fenômenos exclusivamente na escala local","Restringir a análise à escala nacional","Articular múltiplas escalas (local, regional, nacional, global) na análise dos fenômenos"],c:3,w:"Pluriescalaridade: um fenômeno local tem causas e efeitos globais — as escalas se articulam."},
{t:"Epistemologia",q:"A geografia humanista diferencia-se da geografia crítica principalmente por:",o:["Usar exclusivamente métodos quantitativos","Ignorar completamente as questões sociais","Focar nas estruturas econômicas e nas desigualdades de classe","Valorizar a experiência subjetiva, os sentimentos e a percepção individual sobre o espaço"],c:3,w:"Humanista: valoriza subjetividade, experiência e percepção. Crítica: foca em estruturas, poder e desigualdades."},
{t:"Avaliação",q:"O portfólio como instrumento de avaliação no ensino de geografia permite, diferentemente da prova tradicional:",o:["Avaliar apenas a memorização de conteúdos","Medir exclusivamente habilidades cartográficas técnicas","Registrar e analisar a evolução do aluno ao longo do tempo por meio de produções diversificadas","Classificar os alunos em rankings de desempenho"],c:2,w:"Portfólio: documenta trajetória, processo e crescimento — não apenas o resultado pontual de um dia."},
{t:"Conceitos avançados",q:"O processo de reterritorialização, que ocorre após a desterritorialização, refere-se a:",o:["O retorno físico obrigatório ao território de origem","A destruição permanente e irreversível do território","A construção de novos vínculos territoriais e identitários após a dissolução dos anteriores","A demarcação técnica de novas fronteiras nacionais"],c:2,w:"Reterritorialização: grupos constroem novos territórios simbólicos e materiais após serem deslocados."},

{t:"Ambiente",q:"A questão dos refugiados climáticos articula, no ensino de geografia, dimensões de:",o:["Apenas ecologia e biologia","Somente direito internacional","Mudanças ambientais, deslocamentos populacionais forçados, direitos humanos e geopolítica global","Apenas política interna dos países afetados"],c:2,w:"Refugiados climáticos: crise ambiental + migração forçada + direitos humanos + geopolítica — fenômeno multiescalar."},
{t:"Epistemologia",q:"O método regressivo-progressivo proposto por Lefebvre para análise do espaço consiste em:",o:["Ir do passado ao presente de forma linear","Analisar apenas o presente sem referência histórica","Partir do presente para regredir ao passado e retornar ao presente com nova compreensão da produção do espaço","Projetar o futuro com base exclusivamente em dados estatísticos"],c:2,w:"Regressivo-progressivo: presente → passado → presente enriquecido. Compreender o espaço exige historicidade."},
{t:"Diversidade",q:"O etnoconhecimento, valorizado na perspectiva decolonial do ensino de geografia, refere-se a:",o:["Conhecimento científico ocidental aplicado a grupos étnicos","Turismo cultural em comunidades indígenas","Apenas as técnicas agrícolas tradicionais","Os saberes territoriais, espaciais e ambientais construídos por povos indígenas e comunidades tradicionais"],c:3,w:"Etnoconhecimento: saberes não-ocidentais sobre o território, o ambiente e o espaço — tão válidos quanto o científico."},
{t:"Diversidade",q:"Para garantir a acessibilidade no ensino de geografia a alunos com deficiência visual, o recurso mais indicado é:",o:["Aumentar o tamanho das fontes nos textos","Usar apenas descrições verbais detalhadas","Dispensar o aluno das atividades cartográficas","Mapas táteis, maquetes e recursos multissensoriais que permitam a percepção espacial pelo tato"],c:3,w:"Mapas táteis e maquetes permitem ao aluno com deficiência visual perceber e analisar o espaço geográfico."},
{t:"Urbanização",q:"A metropolização como processo geográfico refere-se a:",o:["O crescimento de pequenas cidades no interior do país","A migração do campo para cidades de médio porte","A redução da população das capitais para cidades menores","A expansão e integração funcional de cidades formando grandes aglomerações urbanas"],c:3,w:"Metropolização: cidades crescem, integram-se funcionalmente e formam metrópoles e regiões metropolitanas."},
{t:"Cartografia",q:"A diferença fundamental entre a cartografia temática e a cartografia topográfica é que:",o:["A topográfica é mais moderna e precisa","A temática serve apenas para fins artísticos","São ferramentas idênticas com nomes diferentes","A cartografia temática representa fenômenos específicos (clima, população, economia) enquanto a topográfica representa o relevo e feições físicas"],c:3,w:"Temática: fenômenos sociais, físicos ou econômicos específicos. Topográfica: representação do relevo e feições físicas do terreno."},
{t:"Epistemologia",q:"A chamada 'virada cultural' na geografia, ocorrida nas últimas décadas do século XX, trouxe como contribuição central:",o:["A volta ao positivismo e à descrição objetiva do espaço","O abandono completo das categorias espaciais clássicas","A incorporação de análises sobre identidade, representação, gênero e diversidade cultural na compreensão do espaço","A rejeição de qualquer forma de quantificação geográfica"],c:2,w:"A virada cultural ampliou a geografia para incluir identidades, representações, diferenças e poder simbólico."},
{t:"Metodologia",q:"A sequência didática no ensino de geografia difere de uma simples lista de aulas porque:",o:["É mais longa e exige mais recursos","É elaborada exclusivamente pelo coordenador pedagógico","Não inclui avaliação dos alunos","Articula de forma coerente objetivos, conteúdos, metodologias, recursos e avaliação em torno de uma intencionalidade pedagógica"],c:3,w:"Sequência didática: unidade articulada com intencionalidade — não é uma soma de aulas isoladas."},
{t:"Pensadores",q:"Milton Santos, ao propor o conceito de 'meio técnico-científico-informacional', descreve:",o:["O espaço geográfico anterior à Revolução Industrial","A fase atual do espaço onde ciência, tecnologia e informação organizam o território de forma globalizada","Apenas os territórios dos países desenvolvidos","O espaço natural sem interferência humana"],c:1,w:"Meio técnico-científico-informacional: fase do espaço em que ciência, tecnologia e informação reestruturaram o território globalmente."},
{t:"Ambiente",q:"A análise geográfica das mudanças climáticas deve considerar, além dos aspectos físicos:",o:["Apenas dados de temperatura e pluviosidade","Exclusivamente os tratados internacionais sobre o tema","As dimensões políticas, econômicas, sociais e as desigualdades no impacto e na responsabilidade entre países","Somente as consequências para os países em desenvolvimento"],c:2,w:"Mudanças climáticas: fenômeno físico com causas e consequências profundamente desiguais entre países e grupos sociais."},
{t:"Pedagogia",q:"A interdisciplinaridade no ensino de geografia justifica-se porque:",o:["Permite eliminar as outras disciplinas do currículo","Facilita a gestão do tempo das aulas","Os fenômenos geográficos são complexos e não podem ser compreendidos por uma única perspectiva disciplinar","Reduz o trabalho de planejamento do professor"],c:2,w:"A complexidade dos fenômenos espaciais exige múltiplas perspectivas — a interdisciplinaridade é condição, não opção."},
{t:"Geopolítica",q:"O conceito de 'território-zona' versus 'território-rede', proposto por Rogério Haesbaert, indica que:",o:["Todo território é necessariamente contíguo e delimitado por fronteiras físicas","Território é apenas uma construção mental sem base material","Na contemporaneidade, os territórios podem ser contíguos (zonas) ou organizados em redes descontínuas","Território e rede são conceitos opostos e excludentes"],c:2,w:"Haesbaert: territórios modernos podem ser zonas contíguas ou redes descontínuas — como diásporas ou redes criminosas."}

  var totalG=EASY.length+HARD.length;

  if(banner){
    app.innerHTML="<div class='banner'><div class='banner-emoji'>🔥💀🔥</div><div class='banner-titulo'>MODO DIFÍCIL ATIVADO</div><div class='banner-desc'>Fase 1 concluída com <strong style='color:#FF4444'>"+score+"</strong> acertos.<br><br>Agora o nível é universitário avançado.<br>As alternativas são mais parecidas entre si.<br>Leia com atenção. Boa sorte.</div><button class='btn' style='margin-top:20px' onclick='iniciarF2()'>Aceitar o desafio →</button></div>";
    return;
  }

  if(idx>=totalG){
    var pct=Math.round((score/totalG)*100);
    var msg=pct>=85?"Resultado impressionante. Domínio real do conteúdo.":pct>=70?"Bom desempenho. Revise os pontos abaixo de 70%.":pct>=50?"No caminho. É preciso revisar antes da prova.":"Revise o material com calma e tente de novo.";
    var byT={};
    results.forEach(function(r){if(!byT[r.t])byT[r.t]={ok:0,n:0};byT[r.t].n++;if(r.ok)byT[r.t].ok++;});
    var rows="";
    Object.keys(byT).forEach(function(t){
      var p=Math.round((byT[t].ok/byT[t].n)*100);
      var c=p>=70?"#2E8B6B":p>=50?"#D9831A":"#CC4636";
      rows+="<div class='trow'><div class='tnome'>"+t+"</div><div class='tbar'><div class='tfill' style='width:"+p+"%;background:"+c+"'></div></div><div class='tsc'>"+byT[t].ok+"/"+byT[t].n+"</div></div>";
    });
    app.innerHTML="<div class='resultado'><div class='big'>"+score+"<small>/"+totalG+"</small></div><div style='font-size:13px;font-weight:700;margin-top:4px'>"+pct+"% de acerto total</div><p class='rmsg'>"+msg+"</p></div><div class='card'><div class='sub'>Por tópico</div>"+rows+"<button class='btn' style='margin-top:16px' onclick='reiniciar()'>Recomeçar do zero</button></div><div class='foot'>Estude com a Mimi! 🐕</div>";
    return;
  }

  var q=Q()[idxFase()];
  var prog=Math.round(((idx+(answered?1:0))/totalG)*100);
  var opts="";
  q.o.forEach(function(o,i){
    var cls="opt";
    if(answered){if(i===q.c)cls+=" certo";else if(i===sel)cls+=" errado";else cls+=" dim";}
    opts+="<button class='"+cls+"' "+(answered?"disabled":"")+" onclick='escolher("+i+")'><span class='letra'>"+L(i)+"</span><span>"+o+"</span></button>";
  });
  var fb="";
  if(answered){
    var ok=sel===q.c;
    fb="<div class='feedback "+(ok?"ok":"no")+"'><img src='"+(ok?"dog-acertou.png":"dog-errou.png")+"' alt='feedback'><div class='fhead'>"+(ok?"🎉 Você Acertou!":"❌ Você Errou")+"</div><div class='fcorreto'>Correta: "+L(q.c)+"</div><div class='fwhy'>"+q.w+"</div></div><button class='btn' onclick='prox()'>"+(idx+1>=totalG?"Ver resultado final":"Próxima →")+"</button>";
  }
  var badge=isHard()?"<div class='modo-badge'>💀 MODO DIFÍCIL 💀</div>":"";
  var fase_label=isHard()?"FASE 2 · MODO DIFÍCIL":"FASE 1 · MODO NORMAL";
  app.innerHTML=badge+"<div class='sub'>"+fase_label+"</div><h1>Fundamentos de Geografia</h1><div style='display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px'><div class='progress-row' style='flex:1;margin:0'><div class='bar'><div class='fill' style='width:"+prog+"%'></div></div><span class='lbl'>"+(idx+1)+"/"+totalG+"</span></div><span class='score'>✓ "+score+"/"+totalG+"</span></div><div class='card'><div class='topic'><span class='qnum'>Q"+(idx+1)+"</span> · "+q.t+"</div><div class='question'>"+q.q+"</div>"+opts+fb+"</div><div class='foot'>"+(answered?"Leia a explicação antes de continuar.":"Cuidado — leia todas as alternativas antes de responder.")+"</div>";
}

function escolher(i){
  if(answered)return;
  sel=i;answered=true;
  var ok=i===Q()[idxFase()].c;
  if(ok)score++;
  results.push({t:Q()[idxFase()].t,ok:ok});
  render();
}
function prox(){
  idx++;sel=null;answered=false;
  if(idx===EASY.length){fase=2;banner=true;setModo();}
  render();
}
function iniciarF2(){banner=false;render();}
function reiniciar(){idx=0;sel=null;answered=false;score=0;results=[];fase=1;banner=false;render();}
render();
</script>
</body>
</html>
