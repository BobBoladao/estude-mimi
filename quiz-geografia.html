    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FBF7EF; color: #26221B; }

        .qtext { font-family: Georgia, serif; font-size: 19px; line-height: 1.4; margin: 10px 0 18px; font-weight: 600; }
        .opt { display: flex; gap: 12px; align-items: flex-start; width: 100%; text-align: left; background: #fff; border: 1.5px solid #EDE4D3; border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; cursor: pointer; font-size: 15px; line-height: 1.35; color: #26221B; transition: border-color .12s, background .12s, transform .06s; }

        .opt.wrong { border-color: #CC4636; background: #FBEAE7; }

        .feedback.no { background: #FBEAE7; border-color: #F0CCC5; }
        .feedback img { width: 100%; max-width: 300px; border-radius: 12px; margin-bottom: 12px; }
        .feedhead { font-weight: 800; font-size: 18px; letter-spacing: .02em; margin-bottom: 8px; }
        .ok .feedhead { color: #2E8B6B; }
        .no .feedhead { color: #CC4636; }
        .feedtext { font-size: 13px; color: #736B5E; margin-top: 8px; }
        .btn { margin-top: 16px; width: 100%; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; background: #26221B; color: #fff; transition: opacity .15s, transform .06s; }

        .btn.accent { background: #D9831A; }
        .foot { text-align: center; font-size: 12px; color: #736B5E; margin-top: 18px; }
        .bigscore { font-family: Georgia, serif; font-size: 54px; font-weight: 700; line-height: 1; color: #A9620A; }
        .bigscore small { font-size: 22px; color: #736B5E; font-weight: 600; }
        .resultmsg { font-size: 16px; margin: 10px 0 22px; line-height: 1.45; }
        .trow { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-top: 1px solid #EDE4D3; }
        .trow:last-child { border-bottom: 1px solid #EDE4D3; }

        .tscore { font-size: 13px; font-variant-numeric: tabular-nums; color: #736B5E; font-weight: 700; }

        .tfill { height: 100%; }
    </style>

    <script>
        const QUESTIONS = [{"topic":"Anos iniciais e BNCC","q":"Segundo o resumo, o ensino de geografia nos anos iniciais deve partir do:","options":["Espaço global e abstrato","Espaço vivido, das relações sociais e do cotidiano da criança","Estudo de países distantes","Memorização de capitais e bandeiras"],"correct":1,"why":"Nos anos iniciais parte-se do espaço vivido, das relações sociais e do cotidiano da criança — o próximo e concreto."},{"topic":"Anos iniciais e BNCC","q":"A BNCC propõe que o ensino de geografia relacione:","options":["A experiência cotidiana do estudante à leitura do mundo e do espaço","Apenas conteúdos teóricos e abstratos","Somente a cartografia avançada","A geografia física exclusivamente à matemática"],"correct":0,"why":"A BNCC liga a experiência cotidiana do estudante à leitura do mundo e do espaço."},{"topic":"Anos iniciais e BNCC","q":"Pedir aos alunos que desenhem o caminho de casa até a escola é exemplo de:","options":["Alfabetização cartográfica por meio do croqui","Avaliação somativa","Aula puramente expositiva","Memorização de mapas-múndi"],"correct":0,"why":"O desenho do trajeto é alfabetização cartográfica feita por meio do croqui."},{"topic":"Anos iniciais e BNCC","q":"Comparar fotografias antigas do bairro com imagens atuais trabalha a compreensão de:","options":["Geografia astronômica","Transformações do espaço geográfico ao longo do tempo","Cálculo de áreas","Regras ortográficas"],"correct":1,"why":"A comparação de imagens antigas e atuais evidencia as transformações do espaço geográfico."},{"topic":"Anos iniciais e BNCC","q":"Partir do 'espaço vivido' do aluno, em didática, corresponde a ir do:","options":["Abstrato para o concreto","Concreto e próximo para o abstrato e distante","Global diretamente para o nada","Mapa-múndi para o croqui"],"correct":1,"why":"O percurso pedagógico vai do concreto/próximo (vivência) ao abstrato/distante."},{"topic":"Anos iniciais e BNCC","q":"Na alfabetização cartográfica, o croqui é:","options":["Um mapa oficial em escala precisa","Um esboço/desenho que representa o espaço de forma simplificada","Uma fotografia aérea profissional","Uma maquete tridimensional"],"correct":1,"why":"Croqui é um esboço simplificado do espaço — primeiro passo da representação cartográfica."},{"topic":"Anos iniciais e BNCC","q":"Uma das aprendizagens centrais da geografia escolar segundo a BNCC é desenvolver o:","options":["Raciocínio geográfico","Cálculo diferencial","Raciocínio exclusivamente histórico","Domínio de idiomas estrangeiros"],"correct":0,"why":"A BNCC destaca o raciocínio geográfico (pensar o espaço, localizar, relacionar fenômenos)."},{"topic":"Anos iniciais e BNCC","q":"Trabalhar fotografias do bairro ajuda o aluno a perceber que o espaço é:","options":["Imutável e fixo","Dinâmico e transformado pela sociedade","Apenas natural, sem ação humana","Desligado do cotidiano"],"correct":1,"why":"O espaço é dinâmico e socialmente produzido/transformado."},{"topic":"Anos iniciais e BNCC","q":"A 'leitura do mundo e do espaço' pressupõe que o aluno:","options":["Apenas decore informações","Compreenda e interprete a realidade ao seu redor","Ignore seu cotidiano","Estude somente o mapa-múndi"],"correct":1,"why":"Ler o mundo é compreender e interpretar criticamente a realidade espacial vivida."},{"topic":"Anos iniciais e BNCC","q":"A geografia nos anos iniciais valoriza o cotidiano da criança porque isso:","options":["Afasta o conteúdo da vida do aluno","Dá sentido ao aprendizado e parte do que o aluno conhece","Substitui qualquer conteúdo conceitual","Impede a aprendizagem de mapas"],"correct":1,"why":"Partir do conhecido dá significado e serve de base para conceitos mais complexos."},{"topic":"Conceitos geográficos","q":"'Tudo aquilo que pode ser percebido pelos sentidos em determinado espaço' define:","options":["Lugar","Paisagem","Território","Região"],"correct":1,"why":"Paisagem é o que se percebe pelos sentidos (visão, audição etc.) em um espaço."},{"topic":"Conceitos geográficos","q":"O exemplo dado no resumo para paisagem é:","options":["Casa","Cachoeira","Brasil","Bairro"],"correct":1,"why":"O resumo usa 'cachoeira' como exemplo de paisagem."},{"topic":"Conceitos geográficos","q":"'Espaço vivido, carregado de experiências, pertencimento e afetividade' define:","options":["Território","Lugar","Paisagem","Região"],"correct":1,"why":"Lugar é o espaço vivido, marcado por afeto, identidade e pertencimento."},{"topic":"Conceitos geográficos","q":"O exemplo dado no resumo para lugar é:","options":["Casa","Cachoeira","Brasil","Continente"],"correct":0,"why":"O resumo usa 'casa' como exemplo de lugar."},{"topic":"Conceitos geográficos","q":"'Espaço delimitado e controlado por um grupo, sociedade ou governo, com relações de poder' é:","options":["Paisagem","Lugar","Território","Sítio"],"correct":2,"why":"Território é o espaço delimitado e controlado, definido por relações de poder."},{"topic":"Conceitos geográficos","q":"O exemplo dado no resumo para território é:","options":["Casa","Cachoeira","Brasil","Praça"],"correct":2,"why":"O resumo usa 'Brasil' como exemplo de território."},{"topic":"Conceitos geográficos","q":"O elemento que mais distingue o território das outras categorias é:","options":["A afetividade","As relações de poder e controle","A percepção pelos sentidos","A escala do mapa"],"correct":1,"why":"O território se define essencialmente por poder, controle e delimitação."},{"topic":"Conceitos geográficos","q":"A categoria mais ligada à afetividade e ao sentimento de pertencimento é:","options":["Território","Lugar","Paisagem","Região"],"correct":1,"why":"Lugar é a categoria do vínculo afetivo e da identidade (topofilia)."},{"topic":"Conceitos geográficos","q":"Diferença essencial entre lugar e território:","options":["Lugar envolve poder; território envolve afeto","Lugar envolve afeto/vivência; território envolve poder/controle","São exatamente sinônimos","Ambos ignoram a ação humana"],"correct":1,"why":"Lugar = vivência e afeto; território = poder e controle sobre o espaço."},{"topic":"Conceitos geográficos","q":"A paisagem costuma ser classificada em:","options":["Natural e cultural (humanizada)","Política e econômica apenas","Vertical e horizontal","Antiga e moderna apenas"],"correct":0,"why":"Paisagem natural (pouca ação humana) e cultural/humanizada (transformada pela sociedade)."},{"topic":"Conceitos geográficos","q":"Uma cidade com ruas, prédios e indústrias é exemplo de paisagem:","options":["Natural","Cultural / humanizada","Intocada","Imaginária"],"correct":1,"why":"A presença marcante da ação humana caracteriza a paisagem cultural/humanizada."},{"topic":"Conceitos geográficos","q":"Para Milton Santos, o espaço geográfico pode ser entendido como:","options":["Um conjunto indissociável de sistemas de objetos e sistemas de ações","Apenas o relevo de um país","Somente o território político","Uma paisagem natural sem ação humana"],"correct":0,"why":"Milton Santos define o espaço como conjunto indissociável de sistemas de objetos e de ações."},{"topic":"Conceitos geográficos","q":"A categoria 'região' refere-se a:","options":["Uma área com características que a diferenciam e lhe dão certa unidade","O espaço da afetividade individual","Tudo o que os sentidos percebem","Apenas o controle por um governo"],"correct":0,"why":"Região é uma porção do espaço com traços comuns (naturais, sociais, econômicos) que a singularizam."},{"topic":"Conceitos geográficos","q":"A noção de território está mais fortemente associada ao conceito de:","options":["Poder","Beleza cênica","Clima","Memória afetiva apenas"],"correct":0,"why":"Território e poder são indissociáveis (controle e domínio do espaço)."},{"topic":"Conceitos geográficos","q":"Afirmar que a paisagem é dinâmica significa que ela:","options":["Nunca muda","Sofre transformações naturais e pela ação humana ao longo do tempo","Existe só na imaginação","Depende apenas do clima"],"correct":1,"why":"A paisagem se transforma por processos naturais e pela ação da sociedade."},{"topic":"Conceitos geográficos","q":"Estudar o 'lugar' na geografia escolar é importante porque:","options":["Afasta o aluno da sua realidade","Conecta o conteúdo à vivência e à identidade do aluno","Trata só de países estrangeiros","Elimina toda subjetividade"],"correct":1,"why":"O lugar liga o conteúdo à experiência e ao pertencimento do estudante."},{"topic":"Cartografia e recursos","q":"Segundo o resumo, os mapas ajudam na:","options":["Compreensão do espaço geográfico, localização e interpretação de informações","Memorização de datas históricas","Resolução de equações","Leitura de poemas"],"correct":0,"why":"Mapas auxiliam na compreensão do espaço, na localização e na interpretação de informações."},{"topic":"Cartografia e recursos","q":"Segundo o resumo, as imagens facilitam a análise de:","options":["Paisagens e aspectos sociais, culturais e ambientais","Cálculos matemáticos","Regras gramaticais","Fórmulas químicas"],"correct":0,"why":"As imagens facilitam a análise de paisagens e dos aspectos sociais, culturais e ambientais."},{"topic":"Cartografia e recursos","q":"A alfabetização cartográfica tem como objetivo:","options":["Ensinar o aluno a ler, interpretar e produzir representações do espaço","Decorar nomes de rios","Apenas colorir mapas prontos","Memorizar capitais"],"correct":0,"why":"Alfabetização cartográfica = formar leitores e produtores de mapas, não decoradores."},{"topic":"Cartografia e recursos","q":"A escala cartográfica indica:","options":["A relação entre as medidas do mapa e a realidade","A cor dos oceanos","O número de habitantes","A direção dos ventos"],"correct":0,"why":"Escala é a proporção entre a distância no mapa e a distância real."},{"topic":"Cartografia e recursos","q":"Comparado a um mapa 1:10.000, um mapa de escala 1:100.000:","options":["Mostra uma área maior com menos detalhes","Mostra uma área menor com mais detalhes","É idêntico em tudo","Não tem relação com o nível de detalhe"],"correct":0,"why":"Quanto maior o denominador, menor a escala: abrange área maior com menos detalhamento."},{"topic":"Cartografia e recursos","q":"Os elementos básicos de um mapa incluem:","options":["Título, legenda, escala e orientação (rosa dos ventos)","Apenas cores","Somente o título","Fotografias e gráficos apenas"],"correct":0,"why":"Um mapa completo traz título, legenda, escala e orientação."},{"topic":"Cartografia e recursos","q":"A legenda de um mapa serve para:","options":["Explicar o significado dos símbolos e das cores","Indicar o autor do mapa","Mostrar apenas a data","Substituir a escala"],"correct":0,"why":"A legenda decodifica símbolos e cores usados na representação."},{"topic":"Cartografia e recursos","q":"A rosa dos ventos em um mapa indica:","options":["A orientação / os pontos cardeais","A escala","A população","O clima"],"correct":0,"why":"A rosa dos ventos mostra a orientação (N, S, L, O)."},{"topic":"Cartografia e recursos","q":"A 'visão vertical' (de cima para baixo) é a base para construir:","options":["Mapas e plantas","Fotografias de perfil","Apenas maquetes","Croquis afetivos"],"correct":0,"why":"Mapas e plantas usam a projeção vertical (visão de cima)."},{"topic":"Cartografia e recursos","q":"A maquete, como recurso didático, ajuda o aluno a:","options":["Compreender a tridimensionalidade e a representação do espaço","Decorar capitais","Calcular juros","Interpretar literatura"],"correct":0,"why":"A maquete trabalha a noção de volume/relevo e a passagem do 3D para o 2D."},{"topic":"Cartografia e recursos","q":"O trabalho de campo no ensino de geografia permite:","options":["Observar e analisar o espaço real, ligando teoria e prática","Apenas passear sem objetivo","Substituir todo o conteúdo teórico","Evitar o contato com a realidade"],"correct":0,"why":"O trabalho de campo conecta a teoria à observação direta do espaço."},{"topic":"Cartografia e recursos","q":"Ferramentas como Google Earth e SIG (Sistemas de Informação Geográfica) contribuem para:","options":["A visualização e a análise do espaço geográfico","A aula de educação física","A memorização gramatical","Algo sem relação com geografia"],"correct":0,"why":"Tecnologias geoespaciais ampliam a visualização e a análise do espaço."},{"topic":"Cartografia e recursos","q":"Segundo o resumo, gráficos, vídeos e fotografias são apresentados como:","options":["Recursos que tornam o ensino mais atrativo","Conteúdos a serem evitados","Substitutos do professor","Exclusivos do ensino superior"],"correct":0,"why":"São recursos que, junto às tecnologias e mapas, tornam o ensino mais atrativo."},{"topic":"Cartografia e recursos","q":"Interpretar corretamente um mapa exige relacionar:","options":["Símbolos, legenda, escala e orientação","Apenas as cores mais bonitas","Somente o título","Apenas a data de publicação"],"correct":0,"why":"A leitura de mapa articula legenda, escala, símbolos e orientação."},{"topic":"Metodologias ativas","q":"São exemplos de metodologias ativas citadas no resumo:","options":["Trabalhos em grupo, jogos educativos, aprendizagem por projetos/problemas e debates","Apenas aula expositiva","Somente aplicação de provas","Cópia de textos do quadro"],"correct":0,"why":"O resumo lista trabalhos em grupo, jogos, ABP e debates como metodologias ativas."},{"topic":"Metodologias ativas","q":"Segundo o resumo, as metodologias ativas tornam as aulas mais:","options":["Dinâmicas, críticas e significativas","Cansativas e passivas","Longas e apenas teóricas","Memorísticas e repetitivas"],"correct":0,"why":"O resumo afirma: tornam as aulas mais dinâmicas, críticas e significativas."},{"topic":"Metodologias ativas","q":"Nas metodologias ativas, o aluno assume o papel de:","options":["Protagonista do próprio aprendizado","Receptor passivo do conteúdo","Mero ouvinte","Espectador"],"correct":0,"why":"A centralidade passa para o aluno, que participa ativamente da construção do saber."},{"topic":"Metodologias ativas","q":"Na aprendizagem baseada em problemas (ABP), pa
